<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Table Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --panel: #f7f7f7;
      --line: #e5e5e5;
      --text: #1a1a1a;
      --muted: #666666;
      --accent: #2da85a;
      --accent-strong: #36c26b;
      --danger: #d64545;
      --surface: #ffffff;
      --surface-hover: #f0f0f0;
      --border: #d4d4d4;
      --border-hover: #b8b8b8;
      --stage-bg: #000000;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 420px 1fr;
      height: 100vh;
      min-height: 520px;
      background: var(--bg);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
      padding: 18px;
      border-right: 1px solid var(--line);
      background: var(--panel);
      overflow: auto;
      font-size: 15px;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .action-button {
      width: 100%;
      height: 44px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .action-button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .action-button.primary {
      border: 1px solid #50f091;
      background: var(--accent);
      color: #041008;
    }

    .action-button.primary:hover {
      background: var(--accent-strong);
    }

    .action-button.secondary {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
    }

    .action-button.secondary:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
    }

    .course-picker {
      position: relative;
      width: 100%;
      min-width: 0;
    }

    .course-picker-trigger {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr) 14px;
      align-items: center;
      gap: 8px;
      width: 100%;
      height: 42px;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      padding: 0 12px;
      font-size: 15px;
      text-align: left;
      cursor: pointer;
      outline: none;
    }

    .course-picker-trigger:hover:not(:disabled) {
      border-color: var(--border-hover);
      background: var(--surface-hover);
    }

    .course-picker-trigger:focus-visible,
    .course-picker.open .course-picker-trigger {
      border-color: var(--accent);
    }

    .course-picker-trigger:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .course-picker-file {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .course-picker-desc {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      text-align: right;
      font-size: 14px;
    }

    .course-picker-chevron {
      color: var(--muted);
      font-size: 14px;
      line-height: 1;
    }

    .course-picker-menu {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      z-index: 30;
      max-height: 280px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .course-picker-item {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr);
      gap: 8px;
      align-items: center;
      width: 100%;
      min-height: 38px;
      padding: 8px 12px;
      font-size: 15px;
      border: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .course-picker-item:hover,
    .course-picker-item.active {
      background: var(--surface-hover);
    }

    .course-picker-item .course-picker-desc {
      font-size: 14px;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
    }

    .status.error {
      color: var(--danger);
    }

    .details {
      margin-top: 4px;
      border-top: 1px solid var(--line);
      padding-top: 12px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .field-group {
      display: grid;
      gap: 10px;
      padding: 14px 0;
      border-top: 1px solid var(--line);
    }

    .field-group:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .field-group:last-child {
      padding-bottom: 0;
    }

    .field-title {
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
    }

    .field-section-title {
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .field {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      outline: none;
    }

    .field select {
      height: 36px;
      padding: 0 10px;
      cursor: pointer;
    }

    .field-readonly {
      display: flex;
      align-items: center;
      height: 36px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface-hover);
      color: var(--text);
      font-size: 15px;
    }

    .field input {
      height: 36px;
      padding: 0 10px;
    }

    .field textarea {
      min-height: 64px;
      padding: 8px;
      resize: vertical;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: var(--accent);
    }

    .checkbox-field {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 15px;
    }

    .checkbox-field input {
      width: auto;
      height: auto;
    }

    .difficulty-stars {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .difficulty-star {
      border: 0;
      background: transparent;
      color: #ccc;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
    }

    .difficulty-star.active,
    .difficulty-star:hover {
      color: #f5c542;
    }

    .difficulty-hint {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      min-height: 18px;
    }

    .target-ball-list {
      display: grid;
      gap: 6px;
    }

    .target-ball-item {
      display: grid;
      gap: 6px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      cursor: pointer;
    }

    .target-ball-item.selected {
      border-color: var(--accent);
      background: rgba(45, 168, 90, 0.06);
    }

    .target-ball-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 0;
    }

    .target-ball-head span {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .sub-ball-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      grid-template-rows: auto auto;
      gap: 4px 8px;
      align-items: center;
    }

    .sub-ball-title {
      display: contents;
    }

    .sub-ball-title > span:first-child {
      grid-column: 1;
      grid-row: 1;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }

    .sub-ball-hint {
      grid-column: 1 / -1;
      grid-row: 2;
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      line-height: 1.45;
      white-space: normal;
    }

    .sub-ball-clear {
      grid-column: 2;
      grid-row: 1;
      width: auto;
      height: 26px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .sub-ball-clear:hover:not(:disabled) {
      border-color: var(--border-hover);
      background: var(--surface-hover);
      color: var(--text);
    }

    .sub-ball-clear:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .legend-upload-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .legend-preview {
      width: 72px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .legend-preview img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .legend-placeholder {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding: 0 4px;
      line-height: 1.3;
    }

    .legend-upload-button {
      flex: 0 0 auto;
      width: auto;
      height: 32px;
      padding: 0 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .free-line-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .free-line-head span {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .free-line-remove {
      flex: 0 0 auto;
      width: auto;
      height: 26px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .free-line-remove:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
      color: var(--text);
    }

    .target-ball-remove {
      width: 24px;
      height: 24px;
      padding: 0;
      border: 0;
      border-radius: 4px;
      background: transparent;
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
    }

    .target-ball-remove:hover {
      background: var(--surface-hover);
      color: var(--danger);
    }

    .target-ball-fields {
      display: grid;
      grid-template-columns: 72px 72px minmax(72px, 1fr) 36px;
      gap: 6px;
      align-items: end;
    }

    .target-ball-field {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .target-ball-field label {
      color: var(--muted);
      font-size: 11px;
    }

    .target-ball-field input {
      width: 100%;
      height: 30px;
      padding: 0 6px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      outline: none;
    }

    .target-ball-field input:focus {
      border-color: var(--accent);
    }

    .target-ball-num-field {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .target-ball-num-field label {
      color: var(--muted);
      font-size: 11px;
    }

    .target-ball-num-field select {
      width: 100%;
      height: 30px;
      padding: 0 6px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      outline: none;
    }

    .target-ball-num-field select:focus {
      border-color: var(--accent);
    }

    .target-ball-preview {
      width: 40px;
      height: 40px;
      object-fit: contain;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.04);
    }

    .target-ball-preview[hidden] {
      display: none;
    }

    .target-ball-add {
      width: 100%;
      height: 32px;
      border: 1px dashed var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
    }

    .target-ball-add:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(45, 168, 90, 0.04);
    }

    .stage {
      position: relative;
      min-width: 0;
      min-height: 0;
      background: var(--stage-bg);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: var(--stage-bg);
    }

    @media (max-width: 760px) {
      body {
        overflow: auto;
      }

      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(420px, 1fr);
        min-height: 100vh;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <div id="coursePicker" class="course-picker">
        <button id="coursePickerTrigger" class="course-picker-trigger" type="button" aria-haspopup="listbox" aria-expanded="false" disabled>
          <span id="coursePickerFile" class="course-picker-file">正在加载题目…</span>
          <span id="coursePickerDesc" class="course-picker-desc"></span>
          <span class="course-picker-chevron" aria-hidden="true">▾</span>
        </button>
        <div id="coursePickerMenu" class="course-picker-menu" role="listbox" aria-label="课程文件" hidden></div>
      </div>
      <div class="button-row">
        <button id="authorizeButton" class="action-button secondary" type="button">目录</button>
        <button id="newCourseButton" class="action-button secondary" type="button" disabled>新建题目</button>
        <button id="loadButton" class="action-button primary" type="button" disabled>加载</button>
      </div>
      <div class="button-row">
        <button id="saveButton" class="action-button secondary" type="button" disabled>保存</button>
        <button id="drawLineButton" class="action-button secondary" type="button" disabled>自由连线</button>
      </div>
      <div class="button-row">
        <button id="virtualPocketButton" class="action-button secondary" type="button" disabled>虚拟袋口</button>
      </div>
      <div id="status" class="status">就绪。</div>
      <form id="details" class="details" aria-live="polite"></form>
    </aside>
    <section class="stage">
      <canvas id="previewCanvas"></canvas>
    </section>
  </main>

    async function fetchJsonLinksFromListing(url) {
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) return [];

      const html = await response.text();
      if (!/Directory listing for/i.test(html)) return [];

      const links = [];
      const pattern = /href="([^"?#]+\.json)"/gi;
      let match = pattern.exec(html);

      while (match) {
        const href = decodeURIComponent(match[1]).replace(/^\.\//, "");
        if (!href.includes("..")) {
          links.push(href);
        }
        match = pattern.exec(html);
      }

      return links;
    }

    async function refreshCourseFilesFromHttp() {
      const baseUrl = getAppFolderUrl();
      const courseLinks = await fetchJsonLinksFromListing(new URL("courses/", baseUrl).href);

      courseFiles = [];

        courseLinks
          .map((name) => name.replace(/^courses\//, ""))
          .filter(isCourseJsonFileName)
          .forEach((file) => addCourseFile(file));
        return;
      }

      // GitHub Pages 等静态托管没有目录列表，回退到内置题目清单。
      refreshCourseFilesFromOfflineBundle();
    }

    function parseCourseFileNumbers() {
      return courseFiles
        .map((file) => {
          const match = file.match(/^table_course_(\d+(?:\.\d+)?)\.(\d+(?:\.\d+)?)\.json$/i);
          if (!match) return null;

          return {
            file,
            chapter: Number(match[1]),
            section: Number(match[2])
          };
        })
        .filter((courseNumber) => courseNumber
          && Number.isFinite(courseNumber.chapter)
          && Number.isFinite(courseNumber.section));
    }

    function getNextCourseNumber() {
      const parsed = parseCourseFileNumbers();
      if (parsed.length === 0) return { chapter: 1, section: 1 };

      parsed.sort((a, b) => (a.chapter - b.chapter) || (a.section - b.section));
      const latest = parsed[parsed.length - 1];

      return {
        chapter: latest.chapter,
        section: Math.round((latest.section + 1) * 1000) / 1000
      };
    }

    function getAvailableChapters(currentChapter) {
      const chapters = new Set(
        Array.from({ length: MAX_CHAPTER }, (_, index) => index + 1)
      );

      parseCourseFileNumbers().forEach((item) => chapters.add(item.chapter));

      const normalizedChapter = Number(currentChapter);
      if (Number.isFinite(normalizedChapter)) {
        chapters.add(normalizedChapter);
      }

      return [...chapters].sort((a, b) => a - b);
    }

    function getNextSectionInChapter(chapter, excludeFile = "") {
      const sections = parseCourseFileNumbers()
        .filter((item) => item.chapter === chapter && item.file !== excludeFile)
        .map((item) => item.section);

      if (sections.length === 0) return 1;

      sections.sort((a, b) => a - b);
      const latest = sections[sections.length - 1];
      return Math.round((latest + 1) * 1000) / 1000;
    }

    }

    async function ensureWritableDirectory() {
      if (usesDownloadSave()) {
        return;
      }

      if (directoryAccessMode === "fsa" && selectedDirectoryHandle) {
        const hasPermission = await verifyDirectoryPermission(selectedDirectoryHandle, true);
        if (hasPermission) return;
      }

      if (location.protocol === "file:") {
        throw new Error("无法用 file:// 保存。请运行 python3 -m http.server 8000 后打开 http://127.0.0.1:8000/index.html");
      }

      if (!("showDirectoryPicker" in window)) {
        throw new Error("保存需要 Chrome 或 Edge 浏览器。");
      }

      setStatus("请选择 table_viewer 2 文件夹（需包含 index.html 和 courses/）…");

      const handle = await window.showDirectoryPicker({
        id: "table-viewer-directory",
        mode: "readwrite"
      });

      await saveDirectoryHandle(handle);
      await applyDirectoryHandle(handle, { preserveEditor: true });
    }

    async function saveCourse() {
      try {
        if (!hasSelectedDirectory()) throw new Error("请先选择目录。");
        if (!activeCourse) throw new Error("没有可保存的题目。");

        await ensureWritableDirectory();

        const course = prepareCourseForSave();
        if (!isPoint(course.ball_white)) {
          throw new Error("请先放置母球后再保存。");
        }

        const fileName = getCourseFileName(course);
        const previousFile = editorFile || activeFile;
        const text = `${JSON.stringify(course, null, 4)}\n`;
        const renameNote = previousFile && previousFile !== fileName && editorFile === previousFile
          ? `\n\n将保存为 ${fileName}，并删除旧文件 ${previousFile}。`
          : "";

        const saveTargetLabel = usesDownloadSave()
          ? "电脑下载目录"
          : `已选择的 ${selectedDirectoryName} 目录`;

        if (!window.confirm(`保存 ${fileName} 到${saveTargetLabel}中？${renameNote}`)) {
          setStatus("已取消保存。");
          return;
        }

        migratePendingLegend(previousFile, fileName);
        migratePendingCourse(previousFile, fileName);
        await writeCourseFile(fileName, text);
        await syncLegendFile(fileName);

        if (previousFile && previousFile !== fileName && editorFile === previousFile) {
          await deleteCourseFileIfExists(previousFile);
        }

        activeCourse = course;
        activeFile = fileName;
        editorFile = fileName;
        rememberActiveFile(fileName);
        resetFreeLineInteraction();
        addCourseFile(fileName);
        updateCourseMetaDesc(fileName, course.desc);
        setSelectedCourseFile(fileName);
        renderDetails(activeCourse, activeFile);
        drawPreview();
        setStatus(usesDownloadSave()
          ? `已下载 ${fileName}。本会话内切换题目会保留修改；持久保存请放入 courses/ 或点「目录」授权写回。`
          : `已保存 ${fileName} 到 ${selectedDirectoryName}。`);
      } catch (error) {
        if (error?.name === "AbortError") {
          setStatus("已取消保存。");
          return;
        }
        setStatus(error.message, true);
      } finally {
        updateButtonStates();
      }
    }

    function openDirectoryDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DIRECTORY_DB_NAME, 1);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(DIRECTORY_STORE_NAME)) {
            db.createObjectStore(DIRECTORY_STORE_NAME);
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function saveDirectoryHandle(handle) {
      const db = await openDirectoryDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(DIRECTORY_STORE_NAME, "readwrite");
        tx.objectStore(DIRECTORY_STORE_NAME).put(handle, DIRECTORY_HANDLE_KEY);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function loadStoredDirectoryHandle() {
      const db = await openDirectoryDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(DIRECTORY_STORE_NAME, "readonly");
        const request = tx.objectStore(DIRECTORY_STORE_NAME).get(DIRECTORY_HANDLE_KEY);
        request.onsuccess = () => resolve(request.result || null);
        request.onerror = () => reject(request.error);
      });
    }

    async function verifyDirectoryPermission(handle, write = true) {
      const options = { mode: write ? "readwrite" : "read" };
      if ((await handle.queryPermission(options)) === "granted") {
        return true;
      }
      return (await handle.requestPermission(options)) === "granted";
    }

    function rememberActiveFile(file) {
      if (file) {
        localStorage.setItem(LAST_FILE_STORAGE_KEY, file);
      } else {
        localStorage.removeItem(LAST_FILE_STORAGE_KEY);
      }
    }

    async function applyDirectoryHandle(handle, options = {}) {
      const { preserveEditor = false } = options;
      const hasPermission = await verifyDirectoryPermission(handle, true);
      if (!hasPermission) {
        throw new Error("未授予文件夹写入权限，保存时请重新选择目录。");
      }

      directoryAccessMode = "fsa";
      selectedDirectoryHandle = handle;
      selectedDirectoryName = handle.name || "已选择目录";

      if (!preserveEditor) {
        resetFreeLineInteraction();
      }

      await loadTableBackgroundFromDirectory();
      await refreshCourseFilesFromDirectory();
      await refreshCourseMetaCache();
      renderCoursePicker();

      if (activeCourse) {
        drawPreview();
      }
    }

    async function applyHttpDirectoryMode() {
      directoryAccessMode = "http";
      selectedDirectoryHandle = null;
      selectedDirectoryName = "当前站点目录";
      resetFreeLineInteraction();
      await loadTableBackgroundFromDirectory();
      await refreshCourseFilesFromDirectory();
      await refreshCourseMetaCache();
      renderCoursePicker();
      drawPreview();
    }

    async function applyFileProtocolMode() {
      directoryAccessMode = "file";
      selectedDirectoryHandle = null;
      selectedDirectoryName = "电脑下载";
      resetFreeLineInteraction();
      activeConfig = DEFAULT_CONFIG;
      await loadTableBackgroundFromDirectory();
      refreshCourseFilesFromOfflineBundle();
      await refreshCourseMetaCache();
      renderCoursePicker();
      drawPreview();
    }

    async function restoreDirectoryOnStartup() {
      if (location.protocol === "file:") {
        await applyFileProtocolMode();

        const lastFile = localStorage.getItem(LAST_FILE_STORAGE_KEY);
        if (lastFile && courseFiles.includes(lastFile)) {
          await loadCourseFile(lastFile);
          setStatus(`已打开 ${lastFile}。保存时会下载 JSON 文件到电脑。`);
          return;
        }

        if (courseFiles.length > 0) {
          await loadCourseFile(courseFiles[0]);
          setStatus(`已加载 ${courseFiles[0]}。无需选择目录，保存时会下载 JSON 到电脑。`);
          return;
        }

        setStatus(`已加载 ${courseFiles.length} 个内置题目。双击打开也能编辑，保存时会下载 JSON 文件到电脑。`);
        return;
      }

      if (isSiteHttpHosting()) {
        if (shouldOfferDirectoryPicker() && "showDirectoryPicker" in window) {
          const handle = await loadStoredDirectoryHandle();
          if (handle) {
            try {
              if (await verifyDirectoryPermission(handle, true)) {
                await applyDirectoryHandle(handle, { preserveEditor: true });

                const lastFile = localStorage.getItem(LAST_FILE_STORAGE_KEY);
                if (lastFile && courseFiles.includes(lastFile)) {
                  await loadCourseFile(lastFile);
                  setStatus(`已打开 ${lastFile}，可直接点「保存」。`);
                  return;
                }

                setStatus(`已连接 ${selectedDirectoryName}，选题后编辑，点「保存」即可。`);
                return;
              }
            } catch (error) {
              // Fall back to embedded online bundle.
            }
          }
        }

        await applyHttpDirectoryMode();

        const lastFile = localStorage.getItem(LAST_FILE_STORAGE_KEY);
        if (lastFile && courseFiles.includes(lastFile)) {
          await loadCourseFile(lastFile);
          setStatus(usesDownloadSave()
            ? `已打开 ${lastFile}。保存时会下载 JSON 到电脑。`
            : `已打开 ${lastFile}。编辑完成后直接点「保存」。`);
          return;
        }

        if (courseFiles.length > 0) {
          await loadCourseFile(courseFiles[0]);
          setStatus(usesDownloadSave()
            ? `已加载 ${courseFiles[0]}。无需选择目录，保存时会下载 JSON 到电脑。`
            : `已加载 ${courseFiles[0]}。选题编辑后，直接点「保存」。`);
          return;
        }

        setStatus(tableBackgroundImage
          ? `已加载 ${courseFiles.length} 个题目。选题编辑后，直接点「保存」。`
          : `已加载 ${courseFiles.length} 个题目，未找到 ${TABLE_BACKGROUND_FILE}。`);
        return;
      }

      if (!("showDirectoryPicker" in window)) return;

      const handle = await loadStoredDirectoryHandle();
      if (!handle) return;

      await applyDirectoryHandle(handle);

      const lastFile = localStorage.getItem(LAST_FILE_STORAGE_KEY);
      if (lastFile && courseFiles.includes(lastFile)) {
        await loadCourseFile(lastFile);
        setStatus(`已恢复目录 ${selectedDirectoryName}，并自动加载 ${lastFile}。`);
        return;
      }

      setStatus(tableBackgroundImage
        ? `已恢复目录 ${selectedDirectoryName}，已加载 ${TABLE_BACKGROUND_FILE}`
        : `已恢复目录 ${selectedDirectoryName}，未找到 ${TABLE_BACKGROUND_FILE}`);
    }

    async function authorizeCoursesFolder() {
      if (!shouldOfferDirectoryPicker()) {
        setStatus("在线版无需选择目录，打开即可编辑；保存时会下载 JSON。");
        return;
      }

      try {
        if ("showDirectoryPicker" in window) {
          const handle = await window.showDirectoryPicker({
            id: "table-viewer-directory",
            mode: "readwrite"
          });

          await saveDirectoryHandle(handle);
          activeFile = "";
          editorFile = null;
          activeCourse = null;
          rememberActiveFile("");
          await applyDirectoryHandle(handle);

          if (courseFiles.length > 0) {
            await loadCourseFile(courseFiles[0]);
          }

          setStatus(tableBackgroundImage
            ? `已选择目录：${selectedDirectoryName}，题目与图例已从本地文件夹加载。`
            : `已选择目录：${selectedDirectoryName}，未找到 ${TABLE_BACKGROUND_FILE}`);
          return;
        }

        if (location.protocol === "file:") {
          await applyFileProtocolMode();
          setStatus("当前浏览器不支持选目录。请改用 Chrome/Edge，或双击「打开 Table Viewer」启动。");
          return;
        }

        if (isSiteHttpHosting()) {
          await applyHttpDirectoryMode();
          if (courseFiles.length > 0) {
            await loadCourseFile(courseFiles[0]);
          }
          setStatus(usesDownloadSave()
            ? "已加载在线题目包。保存时会下载 JSON 到电脑。"
            : "已加载在线题目包。编辑完成后直接点「保存」。");
          return;
        }

        throw new Error("当前浏览器不支持目录授权，请使用 Chrome 或 Edge 打开在线链接，或通过 http://127.0.0.1:8000 访问。");
      } catch (error) {
        if (error?.name === "AbortError") return;
        setStatus(error.message, true);
      } finally {
        updateButtonStates();
      }
    }

    async function loadConfigFromSelectedDirectory() {
      try {
        return await readJsonFileFromSelectedDirectory("table_config.json");
      } catch (error) {
        return DEFAULT_CONFIG;
      }
    }

    async function readJsonFromHttpCandidates(fileName) {
      const baseUrl = getAppFolderUrl();
      const candidates = [fileName, `courses/${fileName}`];

      for (const candidate of candidates) {
        try {
          const response = await fetch(new URL(candidate, baseUrl), { cache: "no-store" });
          if (response.ok) {
            return parseJsonText(await response.text());
          }
        } catch (error) {
          // Try the next candidate path.
        }
      }

      return null;
    }

    async function readJsonFileFromSelectedDirectory(fileName) {
      if (!hasSelectedDirectory()) throw new Error("请先选择目录。");

      if (usesDownloadSave() && pendingCourseByFile.has(fileName)) {
        return parseJsonText(JSON.stringify(pendingCourseByFile.get(fileName)));
      }

      if (directoryAccessMode === "file") {
        if (fileName === "table_config.json") return DEFAULT_CONFIG;

        const fromHttp = await readJsonFromHttpCandidates(fileName);
        if (fromHttp) return fromHttp;

        return cloneOfflineCourse(fileName);
      }

      if (isHttpDirectoryMode()) {
        const fromHttp = await readJsonFromHttpCandidates(fileName);
        if (fromHttp) return fromHttp;

        throw new Error(`未找到 ${fileName}。请确认本地服务在 table_viewer 2 目录启动，并访问 http://127.0.0.1:8000/index.html。`);
      }

      try {
        const fileHandle = await getFileHandleFromDirectory(fileName, ["courses"]);
        const file = await fileHandle.getFile();
        return parseJsonText(await file.text());
      } catch (error) {
        const fromHttp = await readJsonFromHttpCandidates(fileName);
        if (fromHttp) {
          setStatus(`已从本地站点读取 ${fileName}（当前授权目录未包含该文件）。保存前请重新点「目录」选择 table_viewer 2 文件夹。`);
          return fromHttp;
        }

        throw new Error(`未找到 ${fileName}。请点「目录」选择 table_viewer 2 文件夹（需包含 index.html 和 courses/）。`);
      }
    }

    async function writeCourseFile(fileName, text) {
      pendingCourseByFile.set(fileName, parseJsonText(text));

      if (usesDownloadSave()) {
        downloadTextFile(fileName, text);
        return;
      }

      if (!selectedDirectoryHandle) throw new Error("请先选择目录。");

      const fileHandle = await getWritableFileHandleInDirectory(fileName, ["courses"]);
      const writable = await fileHandle.createWritable();
      await writable.write(text);
      await writable.close();
      await refreshCourseFilesFromDirectory();
    }

    function downloadTextFile(fileName, text) {
      const blob = new Blob([text], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 0);
    }

    async function getWritableFileHandleInDirectory(fileName, subdirectories = []) {
      if (selectedDirectoryHandle) {
        try {
          return await getFileHandleFromDirectory(fileName, subdirectories);
        } catch (error) {
          // Fall through and create alongside the first available parent directory.
        }
      }

      const parentDir = subdirectories[0];
      if (parentDir) {
        try {
          const dirHandle = await selectedDirectoryHandle.getDirectoryHandle(parentDir, { create: true });
          return dirHandle.getFileHandle(fileName, { create: true });
        } catch (error) {
          // Fall back to root.
        }
      }

      return selectedDirectoryHandle.getFileHandle(fileName, { create: true });
    }

    function getLegendBaseName(jsonFileName) {
      return jsonFileName.replace(/\.json$/i, "");
    }

    function getLegendCandidateNames(jsonFileName) {
      const base = getLegendBaseName(jsonFileName);
      return ["png", "jpg", "jpeg", "webp", "gif"].map((ext) => `${base}.legend.${ext}`);
    }

    function getLegendFileNameFromBlob(jsonFileName, blob) {
      const base = getLegendBaseName(jsonFileName);
      const type = blob.type || "image/png";

      if (type === "image/jpeg") return `${base}.legend.jpg`;
      if (type === "image/webp") return `${base}.legend.webp`;
      if (type === "image/gif") return `${base}.legend.gif`;

      return `${base}.legend.png`;
    }

    function revokeLegendPreviewUrl(jsonFileName) {
      const url = legendPreviewUrlByFile.get(jsonFileName);
      if (url && url.startsWith("blob:")) {
        URL.revokeObjectURL(url);
      }
    }

    function probeImageUrl(url) {
      return new Promise((resolve) => {
        const image = new Image();
        image.onload = () => resolve(url);
        image.onerror = () => resolve(null);
        image.src = url;
      });
    }

    async function loadLegendImageForFile(jsonFileName) {
      if (!jsonFileName) return null;

      revokeLegendPreviewUrl(jsonFileName);
      legendPreviewUrlByFile.delete(jsonFileName);

      if (pendingLegendBlobByFile.has(jsonFileName)) {
        const url = URL.createObjectURL(pendingLegendBlobByFile.get(jsonFileName));
        legendPreviewUrlByFile.set(jsonFileName, url);
        updateLegendPreview(jsonFileName);
        return url;
      }

      if (pendingLegendClear.has(jsonFileName)) {
        updateLegendPreview(jsonFileName);
        return null;
      }

      const candidates = getLegendCandidateNames(jsonFileName);

      if (isFileProtocolMode() && !selectedDirectoryHandle) {
        const baseUrl = getAppFolderUrl();

        for (const name of candidates) {
          for (const candidate of [name, `courses/${name}`, `courses/courses/${name}`]) {
            const url = new URL(candidate, baseUrl).href;
            const loadedUrl = await probeImageUrl(url);
            if (loadedUrl) {
              legendPreviewUrlByFile.set(jsonFileName, loadedUrl);
              updateLegendPreview(jsonFileName);
              return loadedUrl;
            }
          }
        }

        updateLegendPreview(jsonFileName);
        return null;
      }

      if (isHttpDirectoryMode()) {
        const baseUrl = getAppFolderUrl();

        for (const name of candidates) {
          for (const candidate of [name, `courses/${name}`, `courses/courses/${name}`]) {
            const response = await fetch(new URL(candidate, baseUrl), { cache: "no-store" });
            if (!response.ok) continue;

            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            legendPreviewUrlByFile.set(jsonFileName, url);
            updateLegendPreview(jsonFileName);
            return url;
          }
        }

        updateLegendPreview(jsonFileName);
        return null;
      }

      for (const name of candidates) {
        try {
          const fileHandle = await getFileHandleFromDirectory(name, ["courses"]);
          const file = await fileHandle.getFile();
          const url = URL.createObjectURL(file);
          legendPreviewUrlByFile.set(jsonFileName, url);
          updateLegendPreview(jsonFileName);
          return url;
        } catch (error) {
          // Try the next extension or path.
        }
      }

      updateLegendPreview(jsonFileName);
      return null;
    }

    async function writeLegendBinaryFile(jsonFileName, blob) {
      const legendFileName = getLegendFileNameFromBlob(jsonFileName, blob);
      const fileHandle = await getWritableFileHandleInDirectory(legendFileName, ["courses"]);
      const writable = await fileHandle.createWritable();
      await writable.write(blob);
      await writable.close();
    }

    async function deleteLegendFiles(jsonFileName) {
      if (!selectedDirectoryHandle) return;

      for (const name of getLegendCandidateNames(jsonFileName)) {
        for (const candidate of [name, `courses/${name}`]) {
          try {
            const segments = candidate.split("/").filter(Boolean);
            let handle = selectedDirectoryHandle;

            for (let index = 0; index < segments.length - 1; index += 1) {
              handle = await handle.getDirectoryHandle(segments[index]);
            }

            await handle.removeEntry(segments[segments.length - 1]);
          } catch (error) {
            // Ignore missing files.
          }
        }
      }
    }

    function migratePendingLegend(fromFile, toFile) {
      if (!fromFile || !toFile || fromFile === toFile) return;

      if (pendingLegendBlobByFile.has(fromFile)) {
        pendingLegendBlobByFile.set(toFile, pendingLegendBlobByFile.get(fromFile));
        pendingLegendBlobByFile.delete(fromFile);
      }

      if (pendingLegendClear.has(fromFile)) {
        pendingLegendClear.add(toFile);
        pendingLegendClear.delete(fromFile);
      }

      if (legendPreviewUrlByFile.has(fromFile)) {
        legendPreviewUrlByFile.set(toFile, legendPreviewUrlByFile.get(fromFile));
        legendPreviewUrlByFile.delete(fromFile);
      }
    }

    function migratePendingCourse(fromFile, toFile) {
      if (!fromFile || !toFile || fromFile === toFile) return;

      if (pendingCourseByFile.has(fromFile)) {
        pendingCourseByFile.set(toFile, pendingCourseByFile.get(fromFile));
        pendingCourseByFile.delete(fromFile);
      }
    }

    async function deleteCourseFileIfExists(fileName) {
      if (isHttpDirectoryMode() || !selectedDirectoryHandle || !fileName) return;

      for (const candidate of [fileName, `courses/${fileName}`]) {
        try {
          const segments = candidate.split("/").filter(Boolean);
          let handle = selectedDirectoryHandle;

          for (let index = 0; index < segments.length - 1; index += 1) {
            handle = await handle.getDirectoryHandle(segments[index]);
          }

          await handle.removeEntry(segments[segments.length - 1]);
        } catch (error) {
          // Ignore missing files.
        }
      }

      await deleteLegendFiles(fileName);
      courseFiles = courseFiles.filter((file) => file !== fileName);
      delete courseMetaByFile[fileName];
    }

    async function syncLegendFile(jsonFileName) {
      if (isHttpDirectoryMode() || directoryAccessMode === "file") return;

      if (pendingLegendClear.has(jsonFileName)) {
        await deleteLegendFiles(jsonFileName);
        pendingLegendClear.delete(jsonFileName);
        pendingLegendBlobByFile.delete(jsonFileName);
        revokeLegendPreviewUrl(jsonFileName);
        legendPreviewUrlByFile.delete(jsonFileName);
        return;
      }

      const blob = pendingLegendBlobByFile.get(jsonFileName);
      if (!blob) return;

      await deleteLegendFiles(jsonFileName);
      await writeLegendBinaryFile(jsonFileName, blob);
      pendingLegendBlobByFile.delete(jsonFileName);
      await loadLegendImageForFile(jsonFileName);
    }

    function legendFields() {
      return `
        <div class="field full">
          <div class="sub-ball-head">
            <div class="sub-ball-title">
              <span>${COURSE_LABELS.legend}</span>
              <span class="sub-ball-hint">另存为同名 .legend 图片，导入时与 json 一起上传</span>
            </div>
            <button class="sub-ball-clear clear-legend" type="button" disabled>清除</button>
          </div>
          <div class="legend-upload-row">
            <div id="legendPreview" class="legend-preview" aria-label="图例预览">
              <span class="legend-placeholder">暂无图例</span>
            </div>
            <label class="legend-upload-button action-button secondary" for="legendFileInput">上传图片</label>
            <input id="legendFileInput" type="file" accept="image/png,image/jpeg,image/webp,image/gif" hidden>
          </div>
        </div>
      `;
    }

    function updateLegendPreview(jsonFileName) {
      const preview = document.getElementById("legendPreview");
      const clearButton = document.querySelector(".clear-legend");
      if (!preview) return;

      const url = legendPreviewUrlByFile.get(jsonFileName);
      preview.innerHTML = "";

      if (url) {
        const image = document.createElement("img");
        image.src = url;
        image.alt = "图例预览";
        preview.appendChild(image);
        if (clearButton) clearButton.disabled = false;
        return;
      }

      const placeholder = document.createElement("span");
      placeholder.className = "legend-placeholder";
      placeholder.textContent = "暂无图例";
      preview.appendChild(placeholder);
      if (clearButton) clearButton.disabled = true;
    }

    function handleLegendFileSelected(event) {
      const file = event.target.files?.[0];
      event.target.value = "";

      if (!file || !activeFile) return;
      if (!file.type.startsWith("image/")) {
        setStatus("图例仅支持图片文件。", true);
        return;
      }

      pendingLegendClear.delete(activeFile);
      pendingLegendBlobByFile.set(activeFile, file);
      revokeLegendPreviewUrl(activeFile);
      legendPreviewUrlByFile.set(activeFile, URL.createObjectURL(file));
      updateLegendPreview(activeFile);
      setStatus("图例已更新，点「保存」时一并写入。");
    }

    function clearLegend() {
      if (!activeFile) return;

      pendingLegendClear.add(activeFile);
      pendingLegendBlobByFile.delete(activeFile);
      revokeLegendPreviewUrl(activeFile);
      legendPreviewUrlByFile.delete(activeFile);
      updateLegendPreview(activeFile);
      setStatus("已清除图例，保存题目后生效。");
    }

    async function getFileHandleFromDirectory(fileName, subdirectories = []) {
      const candidates = [fileName, ...subdirectories.map((dir) => `${dir}/${fileName}`)];

      for (const candidate of candidates) {
        try {
          const segments = candidate.split("/").filter(Boolean);
          let handle = selectedDirectoryHandle;

          for (const segment of segments) {
            handle = await handle.getFileHandle(segment);
          }

          return handle;
        } catch (error) {
          // Try the next candidate path.
        }
      }

      throw new Error(`未找到 ${fileName}`);
    }

    async function loadTableBackgroundFromDirectory() {
      clearTableBackground();
      if (!hasSelectedDirectory()) return;

      if (isHttpDirectoryMode()) {
        if (TABLE_BACKGROUND_DATA_URL) {
          try {
            tableBackgroundUrl = TABLE_BACKGROUND_DATA_URL;
            tableBackgroundImage = await loadImage(tableBackgroundUrl);
            return;
          } catch (error) {
            // Fall back to fetched PNG files.
          }
        }

        const baseUrl = getAppFolderUrl();
        const candidates = [TABLE_BACKGROUND_FILE, `courses/${TABLE_BACKGROUND_FILE}`];

        for (const candidate of candidates) {
          try {
            const url = new URL(candidate, baseUrl).href;
            tableBackgroundUrl = url;
            tableBackgroundImage = await loadImage(url);
            return;
          } catch (error) {
            // Try the next candidate path.
          }
        }

        await loadEmbeddedTableBackground();
        return;
      }

      if (directoryAccessMode === "file") {
        await loadStaticTableBackground();
        return;
      }

      if (!selectedDirectoryHandle) return;

      try {
        const fileHandle = await getFileHandleFromDirectory(TABLE_BACKGROUND_FILE, ["courses"]);
        const file = await fileHandle.getFile();
        tableBackgroundUrl = URL.createObjectURL(file);
        tableBackgroundImage = await loadImage(tableBackgroundUrl);
      } catch (error) {
        await loadEmbeddedTableBackground();
      }
    }

    async function loadStaticTableBackground() {
      const candidates = [
        new URL(TABLE_BACKGROUND_FILE, getAppFolderUrl()).href,
        new URL(`courses/${TABLE_BACKGROUND_FILE}`, getAppFolderUrl()).href
      ];

      for (const url of candidates) {
        try {
          tableBackgroundUrl = url;
          tableBackgroundImage = await loadImage(url);
          return;
        } catch (error) {
          // Try the next local file path.
        }
      }

      await loadEmbeddedTableBackground();
    }

    function clearTableBackground() {
      tableBackgroundImage = null;
      if (tableBackgroundUrl && tableBackgroundUrl.startsWith("blob:")) {
        URL.revokeObjectURL(tableBackgroundUrl);
      }
      tableBackgroundUrl = "";
    }

    async function loadEmbeddedTableBackground() {
      // 桌台背景图片缺失时使用内置背景，避免免安装交付包丢图。
      clearTableBackground();
      const blob = new Blob([EMBEDDED_TABLE_BACKGROUND_SVG], { type: "image/svg+xml" });
      tableBackgroundUrl = URL.createObjectURL(blob);
      tableBackgroundImage = await loadImage(tableBackgroundUrl);
    }

    function loadImage(url) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = () => reject(new Error(`无法加载 ${TABLE_BACKGROUND_FILE}。`));
        image.src = url;
      });
    }

    async function refreshCourseFilesFromDirectory() {
      if (!hasSelectedDirectory()) return;

      if (directoryAccessMode === "file") {
        refreshCourseFilesFromOfflineBundle();
        return;
      }

      if (isHttpDirectoryMode()) {
        await refreshCourseFilesFromHttp();
        return;
      }

      if (!selectedDirectoryHandle) return;

      courseFiles = [];
      for await (const [name, handle] of selectedDirectoryHandle.entries()) {
        if (handle.kind === "file" && isCourseJsonFileName(name)) {
          addCourseFile(name);
        }
      }

      try {
        const coursesDir = await selectedDirectoryHandle.getDirectoryHandle("courses");
        for await (const [name, handle] of coursesDir.entries()) {
          if (handle.kind === "file" && isCourseJsonFileName(name)) {
            addCourseFile(name);
          }
        }
      } catch (error) {
        // courses/ is optional.
      }
    }

    function addCourseFile(file) {
      if (!courseFiles.includes(file)) {
        courseFiles.push(file);
        courseFiles.sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
      }
    }

    function parseJsonText(text) {
      return JSON.parse(stripJsonComments(text).replace(/,\s*([}\]])/g, "$1"));
    }

    function stripJsonComments(text) {
      let output = "";
      let inString = false;
      let escaped = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];

        if (inString) {
          output += char;
          if (escaped) {
            escaped = false;
          } else if (char === "\\") {
            escaped = true;
          } else if (char === "\"") {
            inString = false;
          }
          continue;
        }

        if (char === "\"") {
          inString = true;
          output += char;
          continue;
        }

        if (char === "/" && next === "/") {
          while (i < text.length && text[i] !== "\n") i += 1;
          output += "\n";
          continue;
        }

        output += char;
      }

      return output;
    }

    function handleChapterChange() {
      if (!activeCourse) return;

      const chapter = readChapterSelect();
      const sectionInput = document.getElementById("section");
      let section = Number(sectionInput?.value);

      if (!editorFile) {
        section = getNextSectionInChapter(chapter, activeFile);
        updateSectionDisplay(section);

        const previousFile = activeFile;
        activeCourse.chapter = chapter;
        activeCourse.section = section;
        activeFile = getCourseFileName(activeCourse);

          addCourseFile(activeFile);
          setSelectedCourseFile(activeFile);

        const titleEl = detailsEl.querySelector(".field-title");
        if (titleEl) titleEl.textContent = activeFile;
      } else {
        activeCourse.chapter = chapter;

        const previousFile = activeFile;
        activeFile = getCourseFileName({ ...activeCourse, chapter, section });

        if (previousFile !== activeFile) {
          migratePendingLegend(previousFile, activeFile);
          courseFiles = courseFiles.filter((file) => file !== previousFile);
          addCourseFile(activeFile);
          setSelectedCourseFile(activeFile);

    function readOptionalNumber(id, fallback = null) {
      const text = readOptionalText(id);
      if (!text) return fallback;

      const number = Number(text);
      return Number.isFinite(number) ? number : fallback;
    }

    function readPointForSave(prefix, fallback) {
      const xText = readOptionalText(`${prefix}_x`);
      const yText = readOptionalText(`${prefix}_y`);

      if (!xText && !yText) return fallback;
      if (!xText || !yText) return fallback;

      const point = { x: Number(xText), y: Number(yText) };
      return isPoint(point) ? point : fallback;
    }

    function readDifficultyForSave(fallback) {
      const element = document.getElementById("difficulty");
      if (!element) return fallback;

      const value = element.value.trim();
      if (!value) return fallback;

      return normalizeDifficulty(value) ?? fallback;
    }

    function readDisplayFlagsForSave() {
      const flags = {};

      DISPLAY_FLAG_IDS.forEach((id) => {
        const element = document.getElementById(id);
        if (element instanceof HTMLInputElement && element.type === "checkbox") {
          flags[id] = element.checked;
        } else if (activeCourse) {
          flags[id] = activeCourse[id] !== false;
        } else {
          flags[id] = true;
        }
      });

      return flags;
    }

    function readTargetBallsForSave() {
      const canvasBalls = getTargetBalls(activeCourse);
      const xInputs = [...detailsEl.querySelectorAll('input[id^="ball_target_"][id$="_x"]')];

      if (xInputs.length === 0) return canvasBalls;

      return xInputs.map((xInput, index) => {
        const match = xInput.id.match(/^ball_target_(\d+)_x$/);
        if (!match) return canvasBalls[index] || null;

        const ballIndex = match[1];
        const fallback = canvasBalls[index] || canvasBalls[Number(ballIndex)] || null;
        const x = readOptionalNumber(`ball_target_${ballIndex}_x`, fallback?.x ?? null);
        const y = readOptionalNumber(`ball_target_${ballIndex}_y`, fallback?.y ?? null);
        const numElement = document.getElementById(`ball_target_${ballIndex}_num`);
        const num = numElement ? normalizeBallNumber(numElement.value) : (fallback?.num ?? null);

        if (x == null || y == null || !isPoint({ x, y })) {
          return fallback && isPoint(fallback)
            ? { x: fallback.x, y: fallback.y, ...(fallback.num != null ? { num: fallback.num } : {}) }
            : null;
        }

        const ball = { x, y };
        if (num != null) ball.num = num;
        return ball;
      }).filter(Boolean);
    }

    function readFreeLinesForSave() {
      const canvasLines = normalizeFreeLines(activeCourse?.free_lines);

      return canvasLines.map((line, index) => {
        const from = readPointForSave(`free_line_${index}_from`, line.from) || line.from;
        const to = readPointForSave(`free_line_${index}_to`, line.to) || line.to;

        if (isPoint(from) && isPoint(to)) {
          return { from, to };
        }

        return line;
      });
    }

    function readCueHitForSave(fallback) {
      const xText = readOptionalText("cue_hit_x");
      const yText = readOptionalText("cue_hit_y");

      if (!xText && !yText) return fallback;
      if (!xText || !yText) return fallback;

      const point = { x: Number(xText), y: Number(yText) };
      if (!isPoint(point)) return fallback;

      return normalizeCueHitPoint(point);
    }

    function readAreaForSave(fallback) {
      const values = ["x1", "y1", "x2", "y2"].map((key) => readOptionalText(`area_${key}`));

      if (values.every((value) => !value)) return fallback;
      if (values.some((value) => !value)) return fallback;

      const area = {
        x1: Number(values[0]),
        y1: Number(values[1]),
        x2: Number(values[2]),
        y2: Number(values[3])
      };

      return isArea(area) ? area : fallback;
    }

    function readVirtualPocketForSave(fallback) {
      return serializeVirtualPocket(readPointForSave("virtual_pocket", fallback));
    }

    function prepareCourseForSave() {
      if (!activeCourse) throw new Error("没有可保存的题目。");

      mergeDisplayFlagsFromEditor();
      const base = normalizeCourse(activeCourse);
      const preservedEdges = getValidPoints(base.edges);

      try {
        const fromEditor = readCourseFromEditor();
        return normalizeCourse({
          ...fromEditor,
          ball_white: fromEditor.ball_white ?? base.ball_white,
          ball_target: fromEditor.ball_target.length ? fromEditor.ball_target : base.ball_target,
          cue_hit: fromEditor.cue_hit ?? base.cue_hit,
          desc_pos: fromEditor.desc_pos ?? base.desc_pos,
          cue_hit_pos: fromEditor.cue_hit_pos ?? base.cue_hit_pos,
          ball_sub: normalizeSubBalls({ ball_sub: fromEditor.ball_sub }).length
            ? fromEditor.ball_sub
            : base.ball_sub,
          area: fromEditor.area ?? base.area,
          virtual_pocket: fromEditor.virtual_pocket ?? serializeVirtualPocket(getVirtualPocket(base)),
          free_lines: fromEditor.free_lines.length ? fromEditor.free_lines : base.free_lines,
          edges: preservedEdges
        });
      } catch (error) {
        return buildCourseForSave();
      }
    }

    function buildCourseForSave() {
      if (!activeCourse) throw new Error("没有可保存的题目。");

      const base = normalizeCourse(activeCourse);
      const flags = readDisplayFlagsForSave();

      return normalizeCourse({
        chapter: readChapterSelect(),
        section: readSectionHidden(),
        desc: readOptionalText("desc"),
        difficulty: readDifficultyForSave(base.difficulty),
        shot_requirement: readOptionalText("shot_requirement"),
        desc_pos: base.desc_pos,
        ball_white: base.ball_white,
        cue_hit: base.cue_hit,
        cue_hit_pos: base.cue_hit_pos,
        ball_target: base.ball_target,
        ball_hint: null,
        ball_sub: base.ball_sub,
        edges: base.edges,
        area: base.area,
        pocket: readOptionalText("pocket") || null,
        virtual_pocket: serializeVirtualPocket(getVirtualPocket(base)),
        show_cue_hit: flags.show_cue_hit,
        show_ghost_ball: flags.show_ghost_ball,
        show_standard_lines: flags.show_standard_lines,
        show_ball_labels: flags.show_ball_labels,
        free_lines: base.free_lines
      });
    }

    function readFreeLinesFromEditor() {
      const lines = normalizeFreeLines(activeCourse?.free_lines);

      return lines.map((_, index) => {
        const from = {
          x: readNumber(`free_line_${index}_from_x`, true),
          y: readNumber(`free_line_${index}_from_y`, true)
        };
        const to = {
          x: readNumber(`free_line_${index}_to_x`, true),
          y: readNumber(`free_line_${index}_to_y`, true)
        };

        return { from, to };
      });
    }

    function normalizeCourse(course) {
      return {
        chapter: Number(course.chapter),
        section: Number(course.section),
        desc: course.desc ?? "",
        difficulty: normalizeDifficulty(course.difficulty),
        shot_requirement: course.shot_requirement ?? "",
        desc_pos: normalizePoint(course.desc_pos, { x: 0, y: 0 }),
        ball_white: normalizePoint(course.ball_white, null),
        cue_hit: normalizeCueHitPoint(course.cue_hit),
        cue_hit_pos: normalizePoint(course.cue_hit_pos, { x: 4, y: 2 }),
        ball_target: serializeBallTarget(normalizeTargetBalls(course.ball_target)),
        ball_hint: null,
        ball_sub: serializeSubBall(normalizeSubBalls(course.ball_sub)),
        edges: getValidPoints(course.edges),
        area: isArea(course.area) ? course.area : null,
        pocket: isBlank(course.pocket) ? null : String(course.pocket),
        virtual_pocket: serializeVirtualPocket(normalizeVirtualPocket(course.virtual_pocket)),
        show_cue_hit: course.show_cue_hit !== false,
        show_ghost_ball: course.show_ghost_ball !== false,
        show_standard_lines: course.show_standard_lines !== false,
        show_ball_labels: course.show_ball_labels !== false,
        free_lines: normalizeFreeLines(course.free_lines || course.manual_lines)
      };
    }

    function normalizeDifficulty(value) {
      if (value === null || value === undefined || value === "") return null;

      const number = Number(value);
      if (Number.isInteger(number) && number >= 1 && number <= 5) return number;

      const starMatch = String(value).match(/([1-5])\s*星/);
      if (starMatch) return Number(starMatch[1]);

      const digitMatch = String(value).trim().match(/^([1-5])$/);
      if (digitMatch) return Number(digitMatch[1]);

      return null;
    }

    function getDifficultyLevel(stars) {
      return DIFFICULTY_LEVELS.find((level) => level.stars === stars) || null;
    }

    function formatDifficultyLabel(stars) {
      const level = getDifficultyLevel(stars);
      if (!level) return "";

      return `${stars}星（${level.title}）`;
    }

    function formatDifficultyDisplay(stars) {
      const label = formatDifficultyLabel(stars);
      if (!label) return "";

      return `难度：${label}`;
    }

    function readDifficulty() {
      const element = document.getElementById("difficulty");
      if (!element) return null;

      const value = element.value.trim();
      if (!value) return null;

      const stars = normalizeDifficulty(value);
      if (!stars) throw new Error(`${COURSE_LABELS.difficulty} 必须是 1-5 星。`);

      return stars;
    }

    function normalizePoint(point, fallback) {
      return isPoint(point) ? { x: point.x, y: point.y } : fallback;
    }

    function normalizePoints(points) {
      if (Array.isArray(points)) return points.filter(isPoint).map((point) => ({ x: point.x, y: point.y }));
      if (isPoint(points)) return [{ x: points.x, y: points.y }];

      return [];
    }

    function normalizeTargetBall(entry) {
      if (!isPoint(entry)) return null;

      const ball = { x: entry.x, y: entry.y };
      const num = normalizeBallId(entry.num);
      if (num != null) ball.num = num;

      return ball;
    }

    function normalizeBallId(value) {
      if (value == null || value === "") return null;

      const text = String(value).trim();
      const alias = SNOOKER_BALL_ALIASES[text];
      if (alias && SNOOKER_BALL_TYPES[alias]) return alias;
      if (SNOOKER_BALL_TYPES[text]) return text;

      const num = Number(text);
      if (!Number.isInteger(num) || num < 1 || num > 15) return null;

      return num;
    }

    function normalizeBallNumber(value) {
      return normalizeBallId(value);
    }

    function isNumberedTargetBall(id) {
      return typeof id === "number";
    }

    function isSnookerTargetBall(id) {
      return typeof id === "string" && Boolean(SNOOKER_BALL_TYPES[id]);
    }

    function getTargetBallLabel(id) {
      if (isNumberedTargetBall(id)) return `${id}号球`;
      if (isSnookerTargetBall(id)) return SNOOKER_BALL_TYPES[id].label;
      return "球类预览";
    }

    function getTargetBallImageFile(id) {
      if (isSnookerTargetBall(id)) return SNOOKER_BALL_TYPES[id].file;
      return `${BALL_NUMBER_IMAGE_DIR}/ball_${id}.png`;
    }

    function getTargetBallImageUrl(id) {
      if (isSnookerTargetBall(id)) {
        const embedded = window.SNOOKER_BALL_DATA_URLS?.[id];
        if (embedded) return embedded;
      }

      return new URL(getTargetBallImageFile(id), getAppFolderUrl()).href;
    }

    function getBallNumberImageFile(num) {
      return getTargetBallImageFile(num);
    }

    function getBallNumberImageUrl(num) {
      return getTargetBallImageUrl(num);
    }

    function normalizeTargetBalls(value) {
      if (value == null) return [];
      if (Array.isArray(value)) {
        return value.map(normalizeTargetBall).filter(Boolean);
      }

      const single = normalizeTargetBall(value);
      return single ? [single] : [];
    }

    function getTargetBalls(course) {
      return normalizeTargetBalls(course?.ball_target);
    }

    function serializeBallTarget(entries) {
      const balls = normalizeTargetBalls(entries);
      if (balls.length === 0) return null;

      const payload = balls.map(({ x, y, num }) => {
        const item = { x, y };
        if (num != null) item.num = num;
        return item;
      });

      if (payload.length === 1) return payload[0];
      return payload;
    }

    function formatTargetBallTitle(index, total) {
      return total > 1 ? `${COURSE_LABELS.ball_target}${index + 1}` : COURSE_LABELS.ball_target;
    }

    function targetBallCompactInput(id, label, value) {
      return `
        <div class="target-ball-field">
          <label for="${id}">${label}</label>
          <input id="${id}" name="${id}" value="${escapeHtml(formatValue(value))}">
        </div>
      `;
    }

    function targetBallNumberSelect(id, selectedId) {
      const numberOptions = TARGET_BALL_NUMBERS.map((num) => {
        const selected = num === selectedId ? " selected" : "";
        return `<option value="${num}"${selected}>${num}号</option>`;
      }).join("");
      const snookerOptions = Object.entries(SNOOKER_BALL_TYPES).map(([key, config]) => {
        const selected = key === selectedId ? " selected" : "";
        return `<option value="${escapeHtml(key)}"${selected}>${escapeHtml(config.label)}</option>`;
      }).join("");

      const options = [
        `<option value="">请选择</option>`,
        `<optgroup label="号码球">${numberOptions}</optgroup>`,
        `<optgroup label="斯诺克">${snookerOptions}</optgroup>`
      ].join("");

      return `
        <div class="target-ball-num-field">
          <label for="${id}">球类</label>
          <select id="${id}" name="${id}">${options}</select>
        </div>
      `;
    }

    function targetBallPreview(index, num) {
      const previewId = `ball_target_${index}_preview`;

      return `
        <img
          id="${previewId}"
          class="target-ball-preview"
          alt="${num ? `${num}号球` : "球号预览"}"
          width="40"
          height="40"
          ${num ? "" : "hidden"}
        >
      `;
    }

    function targetBallsFields(ballTarget) {
      const balls = normalizeTargetBalls(ballTarget);
      const listHtml = balls.map((ball, index) => `
        <div class="target-ball-item${index === selectedTargetBallIndex ? " selected" : ""}" data-index="${index}">
          <div class="target-ball-head">
            <span>${escapeHtml(formatTargetBallTitle(index, balls.length))}</span>
            <button class="target-ball-remove delete-target-ball" type="button" data-index="${index}" aria-label="删除">×</button>
          </div>
          <div class="target-ball-fields">
            ${targetBallCompactInput(`ball_target_${index}_x`, "x", formatCoordinateValue(ball.x))}
            ${targetBallCompactInput(`ball_target_${index}_y`, "y", formatCoordinateValue(ball.y))}
            ${targetBallNumberSelect(`ball_target_${index}_num`, ball.num ?? null)}
            ${targetBallPreview(index, ball.num ?? null)}
          </div>
        </div>
      `).join("");

      return `
        <div class="field full">
          <label>目标球</label>
          <div class="target-ball-list">
            ${listHtml}
            <button class="target-ball-add add-target-ball" type="button">+ 添加目标球</button>
          </div>
        </div>
      `;
    }

    function addTargetBall() {
      if (!activeCourse) return;

      let targets = getTargetBalls(activeCourse);
      try {
        targets = readTargetBallsFromEditor();
      } catch (error) {
        // Keep the last valid in-memory list when the form is mid-edit.
      }

      targets.push({ x: 4, y: 2 });
      activeCourse.ball_target = serializeBallTarget(targets);
      selectedTargetBallIndex = targets.length - 1;
      renderDetails(activeCourse, activeFile);
      updateButtonStates();
      drawPreview();
      setStatus(`已添加${formatTargetBallTitle(targets.length - 1, targets.length)}，可拖动调整位置。`);
    }

    function selectTargetBall(index) {
      if (!activeCourse) return;

      const targets = getTargetBalls(activeCourse);
      if (!Number.isInteger(index) || index < 0 || index >= targets.length) return;

      selectedTargetBallIndex = index;
      renderDetails(activeCourse, activeFile);
      updateButtonStates();
      drawPreview();
      setStatus(`已选中${formatTargetBallTitle(index, targets.length)}。`);
    }

    function readTargetBallsFromEditor() {
      const xInputs = [...detailsEl.querySelectorAll('input[id^="ball_target_"][id$="_x"]')];

      return xInputs.map((xInput) => {
        const match = xInput.id.match(/^ball_target_(\d+)_x$/);
        if (!match) throw new Error("目标球字段格式无效。");

        const index = match[1];
        return {
          x: readNumber(`ball_target_${index}_x`, true),
          y: readNumber(`ball_target_${index}_y`, true),
          num: readBallNumber(`ball_target_${index}_num`)
        };
      });
    }

    function readOptionalText(id) {
      const element = document.getElementById(id);
      return element ? element.value.trim() : "";
    }

    function readBallNumber(id) {
      const element = document.getElementById(id);
      if (!element) return null;

      return normalizeBallNumber(element.value);
    }

    function normalizeSubBall(entry) {
      if (!isPoint(entry)) return null;

      return { x: entry.x, y: entry.y };
    }

    function normalizeSubBalls(value) {
      if (value == null) return [];
      if (Array.isArray(value)) {
        return value.map(normalizeSubBall).filter(Boolean);
      }

      const single = normalizeSubBall(value);
      return single ? [single] : [];
    }

    function getSubBalls(course) {
      return normalizeSubBalls(course?.ball_sub);
    }

    function serializeSubBall(entries) {
      const balls = normalizeSubBalls(entries);
      if (balls.length === 0) return null;

      const payload = balls.map(({ x, y }) => ({ x, y }));
      if (payload.length === 1) return payload[0];
      return payload;
    }

    function formatSubBallTitle(index, total) {
      return total > 1 ? `${COURSE_LABELS.ball_sub}${index + 1}` : COURSE_LABELS.ball_sub;
    }

    function subBallFields(ballSub) {
      const balls = normalizeSubBalls(ballSub);
      const listHtml = balls.map((ball, index) => `
        <div class="target-ball-item${index === selectedSubBallIndex ? " selected" : ""}" data-index="${index}">
          <div class="target-ball-head">
            <span>${escapeHtml(formatSubBallTitle(index, balls.length))}</span>
            <button class="target-ball-remove delete-sub-ball" type="button" data-index="${index}" aria-label="删除">×</button>
          </div>
          <div class="target-ball-fields">
            ${targetBallCompactInput(`ball_sub_${index}_x`, "x", formatCoordinateValue(ball.x))}
            ${targetBallCompactInput(`ball_sub_${index}_y`, "y", formatCoordinateValue(ball.y))}
          </div>
        </div>
      `).join("");

      return `
        <div class="field full">
          <label>${COURSE_LABELS.ball_sub}</label>
          <div class="target-ball-list sub-ball-list">
            ${listHtml}
            <button class="target-ball-add add-sub-ball" type="button">+ 添加辅助球</button>
          </div>
        </div>
      `;
    }

    function addSubBall() {
      if (!activeCourse) return;

      let subs = getSubBalls(activeCourse);
      try {
        subs = readSubBallsFromEditor();
      } catch (error) {
        // Keep the last valid in-memory list when the form is mid-edit.
      }

      subs.push({ x: 1, y: 1 });
      activeCourse.ball_sub = serializeSubBall(subs);
      selectedSubBallIndex = subs.length - 1;
      renderDetails(activeCourse, activeFile);
      updateButtonStates();
      drawPreview();
      setStatus(`已添加${formatSubBallTitle(subs.length - 1, subs.length)}，可拖动调整位置。`);
    }

    function selectSubBall(index) {
      if (!activeCourse) return;

      const subs = getSubBalls(activeCourse);
      if (!Number.isInteger(index) || index < 0 || index >= subs.length) return;

      selectedSubBallIndex = index;
      renderDetails(activeCourse, activeFile);
      updateButtonStates();
      drawPreview();
      setStatus(`已选中${formatSubBallTitle(index, subs.length)}。`);
    }

    function readSubBallsFromEditor() {
      const xInputs = [...detailsEl.querySelectorAll('input[id^="ball_sub_"][id$="_x"]')];

      return xInputs.map((xInput) => {
        const match = xInput.id.match(/^ball_sub_(\d+)_x$/);
        if (!match) throw new Error("辅助球字段格式无效。");

        const index = match[1];
        return {
          x: readNumber(`ball_sub_${index}_x`, true),
          y: readNumber(`ball_sub_${index}_y`, true)
        };
      });
    }

    function normalizeVirtualPocket(value) {
      return normalizePoint(value, null);
    }

    function getVirtualPocket(course) {
      return normalizeVirtualPocket(course?.virtual_pocket);
    }

    function serializeVirtualPocket(point) {
      const normalized = normalizeVirtualPocket(point);
      if (!normalized) return null;

      return { x: normalized.x, y: normalized.y };
    }

    function virtualPocketFields(virtualPocket) {
      const point = getVirtualPocket({ virtual_pocket: virtualPocket });

      return `
        <div class="field full">
          <div class="sub-ball-head">
            <div class="sub-ball-title">
              <span>${COURSE_LABELS.virtual_pocket}</span>
              <span class="sub-ball-hint">点击「虚拟袋口」后标记；可拖动调整，优先于目标袋口编号。</span>
            </div>
            <button class="sub-ball-clear clear-virtual-pocket" type="button"${point ? "" : " disabled"}>清除</button>
          </div>
          <div class="field-grid">
            ${inputField("virtual_pocket_x", "横坐标 x", point ? formatCoordinateValue(point.x) : "")}
            ${inputField("virtual_pocket_y", "纵坐标 y", point ? formatCoordinateValue(point.y) : "")}
          </div>
        </div>
      `;
    }

    function readVirtualPocketFromEditor() {
      const xText = readOptionalText("virtual_pocket_x");
      const yText = readOptionalText("virtual_pocket_y");
      if (!xText && !yText) return null;
      if (!xText || !yText) throw new Error("虚拟袋口需要同时填写 x 和 y。");

      const point = { x: Number(xText), y: Number(yText) };
      if (!isPoint(point)) throw new Error("虚拟袋口坐标必须是数字。");

      return serializeVirtualPocket(point);
    }

    function updateEditorVirtualPocket(point) {
      const xInput = document.getElementById("virtual_pocket_x");
      const yInput = document.getElementById("virtual_pocket_y");
      const clearButton = document.querySelector(".clear-virtual-pocket");
      if (!xInput || !yInput) return;

      if (!point) {
        xInput.value = "";
        yInput.value = "";
        if (clearButton) clearButton.disabled = true;
        return;
      }

      xInput.value = formatCoordinateValue(point.x);
      yInput.value = formatCoordinateValue(point.y);
      if (clearButton) clearButton.disabled = false;
    }

    function clearVirtualPocket() {
      if (!activeCourse) return;

      activeCourse.virtual_pocket = null;
      updateEditorVirtualPocket(null);
      updateButtonStates();
      drawPreview();
      setStatus("已清除虚拟袋口。");
    }

    function getVirtualPocketMarkerRadius(renderContext) {
      return getBallRadius(renderContext.cellPixelWidth);
    }

    function getVirtualPocketHitRadius(renderContext) {
      return getVirtualPocketMarkerRadius(renderContext) + 10;
    }

    function isPointOnVirtualPocket(canvasPoint, renderContext) {
      const virtualPocket = getVirtualPocket(activeCourse);
      if (!virtualPocket) return false;

      const center = renderContext.displayToCanvas(virtualPocket);
      return Math.hypot(canvasPoint.x - center.x, canvasPoint.y - center.y)
        <= getVirtualPocketHitRadius(renderContext);
    }

    function resolvePocketCanvasPoint(course, config, toCanvas, bounds, layout) {
      const virtualPocket = getVirtualPocket(course);
      if (virtualPocket) {
        return toCanvas(virtualPocket);
      }

      const pocketId = Number(course.pocket);
      if (!Number.isFinite(pocketId) || pocketId === 0) return null;

      const pocketLabel = String(pocketId);
      const pockets = normalizePockets(config.pockets);
      const pocketPoint = pockets[pocketLabel] || pockets[pocketId];
      if (!isPoint(pocketPoint)) return null;

      const grid = getGrid(config);
      const xStep = inferStep(grid.xLines);
      const yStep = inferStep(grid.yLines);
      const inset = { x: xStep * 0.18, y: yStep * 0.18 };

      if (
        tableBackgroundImage
        && !TABLE_BACKGROUND_HAS_BUILTIN_OVERLAY
        && layout?.background
        && TABLE_POCKET_LABEL_IMAGE_RATIO[pocketLabel]
      ) {
        return getPocketLabelCanvasCenter(pocketLabel, layout, pocketPoint, bounds, toCanvas, inset);
      }

      return pocketPointToCanvas(pocketPoint, bounds, toCanvas, inset);
    }

    function normalizeCueHitPoint(point) {
      if (!isPoint(point)) return null;

      return {
        x: Math.max(-1, Math.min(1, point.x)),
        y: Math.max(-1, Math.min(1, point.y))
      };
    }

    function readCueHitFromEditor() {
      const xText = readOptionalText("cue_hit_x");
      const yText = readOptionalText("cue_hit_y");
      if (!xText && !yText) return null;
      if (!xText || !yText) throw new Error(`${COURSE_LABELS.cue_hit} 需要同时填写 x 和 y。`);

      const point = { x: Number(xText), y: Number(yText) };
      if (!isPoint(point)) throw new Error(`${COURSE_LABELS.cue_hit} 的 x 和 y 必须是数字。`);

      return normalizeCueHitPoint(point);
    }

    function normalizeFreeLines(lines) {
      if (!Array.isArray(lines)) return [];

      return lines
        .filter((freeLine) => isPoint(freeLine?.from) && isPoint(freeLine?.to))
        .map((freeLine) => ({
          from: normalizePoint(freeLine.from, null),
          to: normalizePoint(freeLine.to, null)
        }));
    }

    function readText(id) {
      const element = document.getElementById(id);
      if (!element) throw new Error(`缺少字段：${id}`);
      return element.value.trim();
    }

    function readNumber(id, required = false) {
      const value = readText(id);
      if (!value && !required) return null;

      const number = Number(value);
      if (!Number.isFinite(number)) throw new Error(`${getFieldLabel(id)} 必须是数字。`);

      return number;
    }

    function readChapterSelect() {
      const element = document.getElementById("chapter");
      if (!element) throw new Error("缺少字段：chapter");

      const number = Number(element.value);
      if (!Number.isFinite(number)) throw new Error(`${COURSE_LABELS.chapter} 无效。`);

      return number;
    }

    function readSectionHidden() {
      const element = document.getElementById("section");
      if (!element) throw new Error("缺少字段：section");

      const number = Number(element.value);
      if (!Number.isFinite(number)) throw new Error(`${COURSE_LABELS.section} 无效。`);

      return number;
    }

    function readCheckbox(id) {
      const element = document.getElementById(id);
      if (!element) throw new Error(`缺少字段：${id}`);

      return element.checked;
    }

    function readPoint(prefix, required = false) {
      const xText = readText(`${prefix}_x`);
      const yText = readText(`${prefix}_y`);

      if (!xText && !yText && !required) return null;
      if (!xText || !yText) throw new Error(`${getFieldLabel(prefix)} 需要同时填写 x 和 y。`);

      const point = { x: Number(xText), y: Number(yText) };
      if (!isPoint(point)) throw new Error(`${getFieldLabel(prefix)} 的 x 和 y 必须是数字。`);

      return point;
    }

    function readPointList(id, errorMessage = `${getFieldLabel(id)} 每行必须是 x,y 坐标。`) {
      const value = readText(id);
      if (!value) return [];

      return value.split(/\n+/)
        .map((lineText) => lineText.trim())
        .filter(Boolean)
        .map((lineText) => {
          const parts = lineText.split(/[\s,]+/).filter(Boolean).map(Number);
          const point = { x: parts[0], y: parts[1] };
          if (parts.length !== 2 || !isPoint(point)) {
            throw new Error(errorMessage);
          }
          return point;
        });
    }

    function readArea() {
      const values = ["x1", "y1", "x2", "y2"].map((key) => readText(`area_${key}`));
      if (values.every((value) => !value)) return null;
      if (values.some((value) => !value)) throw new Error("停球区需要完整填写 x1、y1、x2、y2。");

      const area = {
        x1: Number(values[0]),
        y1: Number(values[1]),
        x2: Number(values[2]),
        y2: Number(values[3])
      };
      if (!isArea(area)) throw new Error("停球区坐标必须是数字。");

      return area;
    }

    function getCourseFileName(course) {
      if (!Number.isFinite(course.chapter) || !Number.isFinite(course.section)) {
        throw new Error("保存前必须填写章节和题号。");
      }

      return `table_course_${formatFileNumber(course.chapter)}.${formatFileNumber(course.section)}.json`;
    }

    function formatFileNumber(value) {
      return Number.isInteger(value) ? String(value) : String(value).replace(/[^\d.-]/g, "");
    }

    function formatValue(value) {
      return value === null || value === undefined ? "" : String(value);
    }

    function getFieldLabel(id) {
      return COURSE_LABELS[id] || id;
    }

    function formatPoints(points) {
      return normalizePoints(points).map(formatPointLine).join("\n");
    }

    function formatPointLine(point) {
      return `${formatCoordinateValue(point.x)}, ${formatCoordinateValue(point.y)}`;
    }

    function formatCoordinateValue(value) {
      if (value === null || value === undefined || value === "") return "";
      const number = Number(value);
      if (!Number.isFinite(number)) return "";

      const text = String(number);
      return text.includes(".") ? text : `${text}.0`;
    }

    function formatCueHitCoordinate(value) {
      if (value === null || value === undefined || value === "") return "";
      const number = Number(value);
      if (!Number.isFinite(number)) return "";

      return number.toFixed(2);
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      const width = Math.max(1, Math.floor(rect.width * ratio));
