      const height = Math.max(1, Math.floor(rect.height * ratio));

      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }

      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    function drawPreview() {
      resizeCanvas();

      const rect = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);
      ctx.fillStyle = "#000000";
      ctx.fillRect(0, 0, rect.width, rect.height);

      if (!hasSelectedDirectory()) return;

      const renderContext = getRenderContext();
      if (!renderContext) return;
      const { grid, bounds, layout, cellPixelWidth, toCanvas, displayToCanvas } = renderContext;

      drawTable(bounds, toCanvas, layout);
      if (!layout.background || !TABLE_BACKGROUND_HAS_BUILTIN_OVERLAY) {
        drawPocketMarkers(activeConfig, grid, bounds, displayToCanvas, layout);
        drawGrid(grid, bounds, toCanvas);
      }

      if (activeCourse) {
        drawCourse(activeCourse, activeConfig, displayToCanvas, cellPixelWidth, bounds, layout);
        drawFreeLineDraft(freeLineDraftStart, displayToCanvas);
      }
    }

    function getRenderContext() {
      const rect = canvas.getBoundingClientRect();
      const grid = getGrid(activeConfig);
      const bounds = grid.bounds;
      const width = Math.max(1, bounds.maxX - bounds.minX);
      const height = Math.max(1, bounds.maxY - bounds.minY);
      const layout = getTableLayout(rect, width, height);
      const cellPixelWidth = inferStep(grid.xLines) * layout.scaleX;
      const toCanvas = (point) => ({
        x: layout.originX + (point.x - bounds.minX) * layout.scaleX,
        y: layout.originY + (bounds.maxY - point.y) * layout.scaleY
      });
      const displayToCanvas = (point) => ({
        x: layout.originX + (point.x - bounds.minX) * layout.scaleX,
        y: layout.originY + (point.y - bounds.minY) * layout.scaleY
      });

      return { rect, grid, bounds, layout, cellPixelWidth, toCanvas, displayToCanvas };
    }

    function getTableLayout(rect, tableWidth, tableHeight) {
      const padding = Math.min(112, Math.max(74, Math.min(rect.width, rect.height) * 0.09));

      if (tableBackgroundImage) {
        const imageWidth = tableBackgroundImage.naturalWidth || tableBackgroundImage.width;
        const imageHeight = tableBackgroundImage.naturalHeight || tableBackgroundImage.height;
        const imageScale = Math.min((rect.width - padding * 2) / imageWidth, (rect.height - padding * 2) / imageHeight);
        const imageX = (rect.width - imageWidth * imageScale) / 2;
        const imageY = (rect.height - imageHeight * imageScale) / 2;
        const gridWidth = (TABLE_GRID_IMAGE_BOUNDS.right - TABLE_GRID_IMAGE_BOUNDS.left) * imageScale;
        const gridHeight = (TABLE_GRID_IMAGE_BOUNDS.bottom - TABLE_GRID_IMAGE_BOUNDS.top) * imageScale;

        return {
          background: {
            x: imageX,
            y: imageY,
            width: imageWidth * imageScale,
            height: imageHeight * imageScale
          },
          originX: imageX + TABLE_GRID_IMAGE_BOUNDS.left * imageScale,
          originY: imageY + TABLE_GRID_IMAGE_BOUNDS.top * imageScale,
          scaleX: gridWidth / tableWidth,
          scaleY: gridHeight / tableHeight
        };
      }

      const scale = Math.min((rect.width - padding * 2) / tableWidth, (rect.height - padding * 2) / tableHeight);

      return {
        background: null,
        originX: (rect.width - tableWidth * scale) / 2,
        originY: (rect.height - tableHeight * scale) / 2,
        scaleX: scale,
        scaleY: scale
      };
    }

    function getGrid(config) {
      const xLines = buildGridLines(config.grid_x, TABLE_COLUMNS, DEFAULT_CONFIG.grid_x);
      const yLines = buildGridLines(config.grid_y, TABLE_ROWS, DEFAULT_CONFIG.grid_y);

      return {
        xLines,
        yLines,
        bounds: {
          minX: xLines[0],
          maxX: xLines[xLines.length - 1],
          minY: yLines[0],
          maxY: yLines[yLines.length - 1]
        }
      };
    }

    function buildGridLines(source, cellCount, fallback) {
      const values = normalizeCoordinates(source, fallback);
      const step = inferStep(values);
      const lines = values.slice(0, cellCount + 1);

      while (lines.length < cellCount + 1) {
        const last = lines.length > 0 ? lines[lines.length - 1] : 0;
        lines.push(last + step);
      }

      return lines;
    }

    function normalizeCoordinates(source, fallback) {
      const values = (Array.isArray(source) ? source : fallback)
        .filter((value) => typeof value === "number" && Number.isFinite(value))
        .sort((a, b) => a - b);

      return [...new Set(values)];
    }

    function inferStep(values) {
      for (let i = 1; i < values.length; i += 1) {
        const step = values[i] - values[i - 1];
        if (step > 0) return step;
      }

      return 1;
    }

    function drawTable(bounds, toCanvas, layout) {
      if (tableBackgroundImage && layout.background) {
        const { x, y, width: bgWidth, height: bgHeight } = layout.background;
        ctx.drawImage(tableBackgroundImage, x, y, bgWidth, bgHeight);
        return;
      }

      const topLeft = toCanvas({ x: bounds.minX, y: bounds.maxY });
      const bottomRight = toCanvas({ x: bounds.maxX, y: bounds.minY });
      const width = bottomRight.x - topLeft.x;
      const height = bottomRight.y - topLeft.y;

      ctx.save();
      ctx.fillStyle = "#102d1b";
      ctx.strokeStyle = "#2b8c4a";
      roundRect(ctx, topLeft.x, topLeft.y, width, height, 10);
      ctx.fill();
      ctx.lineWidth = 2;
      roundRect(ctx, topLeft.x, topLeft.y, width, height, 10);
      ctx.stroke();
      ctx.restore();
    }

    function drawTableWatermark(layout) {
      if (!layout.background) return;

      const { x, y, width: bgWidth, height: bgHeight } = layout.background;
      const { text, fill, opacity, fontWeight, textWidthRatio } = TABLE_WATERMARK;
      const fontFamily = '"Alibaba-PuHuiTi-Heavy", "PingFang SC", sans-serif';
      const targetWidth = bgWidth * textWidthRatio;
      let fontSize = Math.round(bgWidth * 0.2);

      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;

      while (ctx.measureText(text).width > targetWidth && fontSize > 12) {
        fontSize -= 2;
        ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
      }

      ctx.globalAlpha = opacity;
      ctx.fillStyle = fill;
      ctx.fillText(text, x + bgWidth / 2, y + bgHeight / 2);
      ctx.restore();
    }

    function drawGrid(grid, bounds, toCanvas) {
      ctx.save();
      ctx.strokeStyle = "rgba(255,255,255,0.34)";
      ctx.lineWidth = 1;

      grid.xLines.forEach((x) => {
        const start = toCanvas({ x, y: bounds.minY });
        const end = toCanvas({ x, y: bounds.maxY });
        line(start, end);
      });

      grid.yLines.forEach((y) => {
        const start = toCanvas({ x: bounds.minX, y });
        const end = toCanvas({ x: bounds.maxX, y });
        line(start, end);
      });

      drawGridLabels(grid, bounds, toCanvas);
      ctx.restore();
    }

    function drawGridLabels(grid, bounds, toCanvas) {
      ctx.save();
      ctx.fillStyle = "#ffffff";
      ctx.font = "12px Segoe UI, Arial, sans-serif";

      ctx.textAlign = "center";
      ctx.textBaseline = "bottom";
      grid.xLines.forEach((x) => {
        const point = toCanvas({ x, y: bounds.maxY });
        ctx.fillText(formatCoordinate(x), point.x, point.y - 6);
      });

      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      grid.yLines.forEach((labelValue, index) => {
        if (index === 0) return;

        const y = grid.yLines[grid.yLines.length - 1 - index];
        const point = toCanvas({ x: bounds.minX, y });
        ctx.fillText(formatCoordinate(labelValue), point.x - 8, point.y);
      });

      ctx.restore();
    }

    function formatCoordinate(value) {
      return value.toFixed(1);
    }

    function drawPocketMarkers(config, grid, bounds, displayToCanvas, layout) {
      const pockets = normalizePockets(config.pockets);
      const xStep = inferStep(grid.xLines);
      const yStep = inferStep(grid.yLines);
      const inset = { x: xStep * 0.18, y: yStep * 0.18 };

      ctx.save();
      ctx.fillStyle = "#fff2a4";
      ctx.font = "22px 'Microsoft YaHei', 'Noto Sans CJK SC', 'Segoe UI Symbol', 'Segoe UI', Arial, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      Object.keys(pockets).forEach((label) => {
        const point = pockets[label];
        if (!isPoint(point)) return;

        const center = getPocketLabelCanvasCenter(label, layout, point, bounds, displayToCanvas, inset);

        ctx.fillText(formatPocketNumber(label), center.x, center.y);
      });
      ctx.restore();
    }

    function getPocketLabelCanvasCenter(label, layout, point, bounds, displayToCanvas, inset) {
      const ratio = tableBackgroundImage
        && !TABLE_BACKGROUND_HAS_BUILTIN_OVERLAY
        && layout?.background
        && TABLE_POCKET_LABEL_IMAGE_RATIO[label];

      if (!ratio) {
        return pocketPointToCanvas(point, bounds, displayToCanvas, inset);
      }

      const yAnchorLabel = label === "1" || label === "3"
        ? "2"
        : label === "4" || label === "6"
          ? "5"
          : label;
      const xAnchorLabel = label === "4"
        ? "1"
        : label === "6"
          ? "3"
          : label;
      const yRatio = TABLE_POCKET_LABEL_IMAGE_RATIO[yAnchorLabel];
      const yOffset = TABLE_POCKET_LABEL_PIXEL_OFFSET[yAnchorLabel] || { x: 0, y: 0 };
      const xRatio = TABLE_POCKET_LABEL_IMAGE_RATIO[xAnchorLabel];
      const xOffset = TABLE_POCKET_LABEL_PIXEL_OFFSET[xAnchorLabel] || { x: 0, y: 0 };

      return {
        x: layout.background.x + layout.background.width * xRatio.x + xOffset.x,
        y: layout.background.y + layout.background.height * yRatio.y + yOffset.y
      };
    }

    function normalizePockets(pockets) {
      if (pockets && !Array.isArray(pockets)) return pockets;

      return DEFAULT_CONFIG.pockets;
    }

    // Same display coords as balls: y grows downward; inset pushes labels toward corner holes.
    function pocketPointToCanvas(point, bounds, displayToCanvas, inset) {
      const adjusted = { x: point.x, y: point.y };

      if (adjusted.x <= bounds.minX) adjusted.x -= inset.x;
      if (adjusted.x >= bounds.maxX) adjusted.x += inset.x;
      if (adjusted.y <= bounds.minY) adjusted.y -= inset.y;
      if (adjusted.y >= bounds.maxY) adjusted.y += inset.y;

      return displayToCanvas(adjusted);
    }

    function formatPocketNumber(label) {
      const numbers = {
        1: "①",
        2: "②",
        3: "③",
        4: "④",
        5: "⑤",
        6: "⑥"
      };

      return numbers[label] || String(label);
    }

    function drawCourse(course, config, toCanvas, cellPixelWidth, bounds, layout) {
      const radius = getBallRadius(cellPixelWidth);
      const showBallLabels = course.show_ball_labels !== false;

      drawArea(course.area, toCanvas, showBallLabels ? COURSE_LABELS.area : "");
      drawVirtualPocketMarker(getVirtualPocket(course), toCanvas, { cellPixelWidth });
      drawPocketAimLine(course, config, radius, toCanvas, bounds, layout);
      drawFreeLines(course.free_lines, toCanvas);
      if (course.show_cue_hit !== false) {
        drawCueHitProjection(course.cue_hit, course.cue_hit_pos, radius, toCanvas);
      }
      drawCourseText(course, toCanvas, bounds);
      drawWhiteBall(
        course.ball_white,
        radius,
        toCanvas,
        showBallLabels ? COURSE_LABELS.ball_white : ""
      );
      getTargetBalls(course).forEach((entry, index, targets) => {
        const label = showBallLabels ? formatTargetBallTitle(index, targets.length) : "";
        drawTargetBall(entry, radius, toCanvas, label, index === selectedTargetBallIndex);
      });
      getSubBalls(course).forEach((entry, index, subs) => {
        const label = showBallLabels ? formatSubBallTitle(index, subs.length) : "";
        drawBall(
          entry,
          radius,
          "rgba(255, 255, 255, 0.5)",
          ".",
          toCanvas,
          label
        );
      });
    }

    function getBallRadius(cellPixelWidth) {
      return Math.max(1, cellPixelWidth * 0.09);
    }

    function getStandardAimGeometry(course, config, radius, toCanvas, bounds, layout) {
      const targets = getTargetBalls(course);
      if (targets.length !== 1) return null;
      if (!isPoint(course.ball_white)) return null;

      const pocket = resolvePocketCanvasPoint(course, config, toCanvas, bounds, layout);
      if (!pocket) return null;

      const target = toCanvas(targets[0]);
      const white = toCanvas(course.ball_white);
      const dx = target.x - pocket.x;
      const dy = target.y - pocket.y;
      const length = Math.hypot(dx, dy);
      if (length === 0) return null;

      const ghostCenter = {
        x: target.x + (dx / length) * radius * 2,
        y: target.y + (dy / length) * radius * 2
      };

      return { pocket, target, white, ghostCenter };
    }

    function drawVirtualPocketMarker(point, toCanvas, renderContext) {
      if (!isPoint(point)) return;

      const center = toCanvas(point);
      const markerRadius = renderContext
        ? getVirtualPocketMarkerRadius(renderContext)
        : getBallRadius(1);
      const isActive = isMarkingVirtualPocket
        || activeDrag?.type === "virtual_pocket";

      ctx.save();
      ctx.beginPath();
      ctx.arc(center.x, center.y, markerRadius, 0, Math.PI * 2);
      ctx.setLineDash([5, 5]);
      ctx.strokeStyle = isActive ? "#ff9800" : "#ffc107";
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = "#ffc107";
      ctx.font = `bold ${Math.max(12, Math.round(markerRadius * 0.85))}px 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("虚", center.x, center.y);
      ctx.restore();
    }

    function drawPocketAimLine(course, config, radius, toCanvas, bounds, layout) {
      const geometry = getStandardAimGeometry(course, config, radius, toCanvas, bounds, layout);
      if (!geometry) return;

      const { pocket, target, white, ghostCenter } = geometry;

      if (course.show_standard_lines !== false) {
        ctx.save();
        ctx.setLineDash([8, 6]);
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        line(pocket, target);
        line(target, ghostCenter);
        line(white, ghostCenter);
        ctx.restore();
      }

      if (course.show_ghost_ball !== false) {
        ctx.save();
        drawGhostBall(ghostCenter, radius);
        drawPointDot(ghostCenter, "#ffffff");
        ctx.restore();
      }
    }

    function drawFreeLines(freeLines, toCanvas) {
      normalizeFreeLines(freeLines).forEach((freeLine, index) => {
        const start = toCanvas(freeLine.from);
        const end = toCanvas(freeLine.to);

        ctx.save();
        ctx.setLineDash([8, 6]);
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = index === selectedFreeLineIndex ? 4 : 2;
        line(start, end);
        ctx.restore();

        const fromSelected = isFreeLineEndpointActive(index, "from");
        const toSelected = isFreeLineEndpointActive(index, "to");
        if (fromSelected) drawFreeLineEndpoint(start);
        if (toSelected) drawFreeLineEndpoint(end);
      });
    }

    function isFreeLineEndpointActive(index, pointName) {
      if (selectedFreeLineEndpoint?.index === index && selectedFreeLineEndpoint?.pointName === pointName) {
        return true;
      }

      return activeDrag?.type === "free_line_point"
        && activeDrag.index === index
        && activeDrag.pointName === pointName;
    }

    function drawFreeLineEndpoint(point) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(point.x, point.y, 6, 0, Math.PI * 2);
      ctx.fillStyle = "#ffffff";
      ctx.fill();
      ctx.strokeStyle = "rgba(0, 0, 0, 0.5)";
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
    }

    function drawFreeLineDraft(point, toCanvas) {
      if (!isPoint(point)) return;

      drawPointDot(toCanvas(point), "#ffffff");
    }

    function getValidPoints(points) {
      return Array.isArray(points) ? points.filter(isPoint) : [];
    }

    function getAreaCenterPoint(area, toCanvas) {
      const p1 = toCanvas({ x: area.x1, y: area.y1 });
      const p2 = toCanvas({ x: area.x2, y: area.y2 });

      return {
        x: (p1.x + p2.x) / 2,
        y: (p1.y + p2.y) / 2
      };
    }

    function drawCourseText(course, toCanvas, bounds) {
      if (!isPoint(course.desc_pos)) return;

      const difficultyStars = normalizeDifficulty(course.difficulty);
      const paragraphs = [
        course.desc,
        difficultyStars ? formatDifficultyDisplay(difficultyStars) : "",
        isBlank(course.shot_requirement) ? "" : `练习目标：${course.shot_requirement}`
      ].filter((lineText) => !isBlank(lineText));

      if (paragraphs.length === 0) return;

      const c = toCanvas(course.desc_pos);
      ctx.save();
      ctx.fillStyle = "#ffffff";
      ctx.font = "18px 'Microsoft YaHei', 'Noto Sans CJK SC', 'Segoe UI', Arial, sans-serif";
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      const rightEdge = toCanvas({ x: bounds.maxX, y: course.desc_pos.y });
      const maxTextWidth = Math.max(24, rightEdge.x - c.x);
      const lineHeight = 24;
      const paragraphGap = 14;
      let y = c.y;

      paragraphs.forEach((paragraph) => {
        const wrappedLines = wrapTextToWidth(ctx, String(paragraph), maxTextWidth);
        wrappedLines.forEach((lineText) => {
          ctx.fillText(lineText, c.x, y);
          y += lineHeight;
        });
        y += paragraphGap;
      });
      ctx.restore();
    }

    function wrapTextToWidth(context, text, maxWidth) {
      const source = String(text);
      const output = [];
      let line = "";

      Array.from(source).forEach((char) => {
        const testLine = line + char;
        if (line && context.measureText(testLine).width <= maxWidth) {
          line = testLine;
          return;
        }

        if (line && context.measureText(testLine).width > maxWidth) {
          output.push(line);
          line = char;
          return;
        }

        line = testLine;
      });

      if (line) output.push(line);

      return output;
    }

    async function loadBallWhiteImage() {
      try {
        const url = new URL(BALL_WHITE_IMAGE_FILE, getAppFolderUrl()).href;
        ballWhiteImage = await loadImage(url);
      } catch (error) {
        ballWhiteImage = null;
      }
    }

    async function loadBallTargetImage() {
      try {
        const url = new URL(BALL_TARGET_IMAGE_FILE, getAppFolderUrl()).href;
        ballTargetImage = await loadImage(url);
      } catch (error) {
        ballTargetImage = null;
      }
    }

    async function loadBallNumberImage(id) {
      const normalizedId = normalizeBallId(id);
      if (normalizedId == null) return null;

      if (ballNumberImages.has(normalizedId)) {
        return ballNumberImages.get(normalizedId);
      }

      if (pendingBallImageLoads.has(normalizedId)) {
        return pendingBallImageLoads.get(normalizedId);
      }

      const promise = loadImage(getTargetBallImageUrl(normalizedId))
        .then((image) => {
          ballNumberImages.set(normalizedId, image);
          pendingBallImageLoads.delete(normalizedId);
          return image;
        })
        .catch((error) => {
          pendingBallImageLoads.delete(normalizedId);
          console.warn(`目标球图片加载失败：${getTargetBallImageFile(normalizedId)}`, error);
          return null;
        });

      pendingBallImageLoads.set(normalizedId, promise);
      return promise;
    }

    async function preloadSnookerBallImages() {
      await Promise.all(
        Object.keys(SNOOKER_BALL_TYPES).map((key) => loadBallNumberImage(key))
      );
    }

    function preloadTargetBallImagesForCanvas(course) {
      getTargetBalls(course).forEach((ball) => {
        if (ball.num == null) return;

        loadBallNumberImage(ball.num).then((image) => {
          if (image) drawPreview();
        });
      });
    }

    function isTargetBallNumSelect(target) {
      return target instanceof HTMLSelectElement
        && /^ball_target_\d+_num$/.test(target.id);
    }

    function applyTargetBallNumChange(index, num) {
      if (!activeCourse) return;

      const targets = getTargetBalls(activeCourse);
      if (!Number.isInteger(index) || index < 0 || index >= targets.length) return;

      const nextBall = { x: targets[index].x, y: targets[index].y };
      if (num != null) nextBall.num = num;
      targets[index] = nextBall;
      activeCourse.ball_target = serializeBallTarget(targets);

      updateTargetBallPreview(index, num);
      const loadPromise = num == null ? Promise.resolve(null) : loadBallNumberImage(num);
      loadPromise.finally(() => drawPreview());
    }

    function handleTargetBallNumChange(event) {
      const select = event.target;
      if (!isTargetBallNumSelect(select)) return;

      const match = select.id.match(/^ball_target_(\d+)_num$/);
      if (!match) return;

      applyTargetBallNumChange(Number(match[1]), readBallNumber(select.id));
    }

    function updateTargetBallPreview(index, num) {
      const preview = document.getElementById(`ball_target_${index}_preview`);
      if (!preview) return;

      const normalizedId = normalizeBallId(num);
      if (normalizedId == null) {
        preview.hidden = true;
        preview.removeAttribute("src");
        preview.alt = "球类预览";
        return;
      }

      preview.alt = getTargetBallLabel(normalizedId);

      const cached = ballNumberImages.get(normalizedId);
      if (cached) {
        preview.src = cached.src;
        preview.hidden = false;
        return;
      }

      preview.hidden = true;
      preview.removeAttribute("src");

      loadBallNumberImage(normalizedId).then((image) => {
        const select = document.getElementById(`ball_target_${index}_num`);
        if (!select || normalizeBallId(select.value) !== normalizedId) return;

        if (!image) {
          preview.hidden = true;
          preview.removeAttribute("src");
          return;
        }

        preview.src = image.src;
        preview.hidden = false;
      });
    }

    function refreshTargetBallPreviews(course) {
      getTargetBalls(course).forEach((ball, index) => {
        updateTargetBallPreview(index, ball.num);
      });
    }

    function drawWhiteBall(point, radius, toCanvas, label = "") {
      if (!isPoint(point)) return;

      const c = toCanvas(point);
      const diameter = radius * 2;
      const {
        width: assetWidth,
        height: assetHeight,
        contentCenterX,
        contentCenterY,
        contentDiameter
      } = BALL_WHITE_ASSET;
      const imageSize = diameter * (assetWidth / contentDiameter);
      const offsetX = (assetWidth / 2 - contentCenterX) * (imageSize / assetWidth);
      const offsetY = (assetHeight / 2 - contentCenterY) * (imageSize / assetHeight);

      ctx.save();
      ctx.beginPath();
      ctx.arc(c.x, c.y, radius, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();

      if (ballWhiteImage) {
        ctx.drawImage(
          ballWhiteImage,
          c.x - imageSize / 2 + offsetX,
          c.y - imageSize / 2 + offsetY,
          imageSize,
          imageSize
        );
      } else {
        ctx.beginPath();
        ctx.arc(c.x, c.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = "#f8f8f8";
        ctx.fill();
      }
      ctx.restore();

      drawPointLabel(c, label, radius + 8);
    }

    function drawTargetBall(ball, radius, toCanvas, label = "", isSelected = false) {
      if (!isPoint(ball)) return;

      const c = toCanvas(ball);
      const diameter = radius * 2;
      const num = normalizeBallId(ball.num);
      const hasCustomBallImage = num != null;
      const asset = isNumberedTargetBall(num) ? BALL_NUMBER_ASSET : BALL_TARGET_ASSET;
      const {
        width: assetWidth,
        height: assetHeight,
        contentCenterX,
        contentCenterY,
        contentDiameter
      } = asset;
      const imageSize = diameter * (assetWidth / contentDiameter);
      const offsetX = (assetWidth / 2 - contentCenterX) * (imageSize / assetWidth);
      const offsetY = (assetHeight / 2 - contentCenterY) * (imageSize / assetHeight);

      if (hasCustomBallImage && !ballNumberImages.has(num) && !pendingBallImageLoads.has(num)) {
        loadBallNumberImage(num).then((image) => {
          if (image) drawPreview();
        });
      }

      const customBallImage = hasCustomBallImage ? ballNumberImages.get(num) : null;
      const imageToDraw = hasCustomBallImage
        ? (customBallImage || ballTargetImage)
        : ballTargetImage;

      ctx.save();
      ctx.beginPath();
      ctx.arc(c.x, c.y, radius, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();

      if (imageToDraw) {
        ctx.drawImage(
          imageToDraw,
          c.x - imageSize / 2 + offsetX,
          c.y - imageSize / 2 + offsetY,
          imageSize,
          imageSize
        );
      } else {
        const snookerFallback = isSnookerTargetBall(num) ? SNOOKER_BALL_TYPES[num].fallback : null;
        const gradient = ctx.createRadialGradient(
          c.x - radius * 0.25,
          c.y - radius * 0.35,
          radius * 0.1,
          c.x,
          c.y,
          radius
        );
        if (snookerFallback) {
          gradient.addColorStop(0, snookerFallback.high);
          gradient.addColorStop(0.55, snookerFallback.mid);
          gradient.addColorStop(1, snookerFallback.low);
        } else {
          gradient.addColorStop(0, "#fff176");
          gradient.addColorStop(0.55, BALL_TARGET_COLOR);
          gradient.addColorStop(1, "#c5a000");
        }
        ctx.beginPath();
        ctx.arc(c.x, c.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
      }
      ctx.restore();

      if (isSelected) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(c.x, c.y, radius + 3, 0, Math.PI * 2);
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.restore();
      }

      drawPointLabel(c, label, radius + 8);
    }

    function drawBall(point, radius, color, centerMark, toCanvas, label = "", lineWidth = 2) {
      if (!isPoint(point)) return;

      const c = toCanvas(point);
      ctx.save();
      ctx.beginPath();
      ctx.arc(c.x, c.y, radius, 0, Math.PI * 2);
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      ctx.stroke();

      drawBallCenterMark(c, radius, color, centerMark);
      ctx.restore();

      drawPointLabel(c, label, radius + 8);
    }

    function drawBallCenterMark(center, radius, color, centerMark) {
      if (centerMark === "+") {
        const size = Math.max(2, radius * 0.65);
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(center.x - size, center.y);
        ctx.lineTo(center.x + size, center.y);
        ctx.moveTo(center.x, center.y - size);
        ctx.lineTo(center.x, center.y + size);
        ctx.stroke();
        return;
      }

      const dotRadius = Math.max(1.2, radius * 0.24);
      ctx.beginPath();
      ctx.arc(center.x, center.y, dotRadius, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }

    function drawCueHitProjection(cueHit, cueHitPos, radius, toCanvas) {
      if (!isPoint(cueHit) || !isPoint(cueHitPos)) return;

      const center = toCanvas(cueHitPos);
      const targetRadius = getCueHitTargetRadius(radius);

      const ringOpacities = [0.45, 0.58, 0.72, 0.86];

      ctx.save();
      ctx.lineWidth = 2;
      ctx.setLineDash([]);

      [1, 0.72, 0.46, 0.22].forEach((scale, index) => {
        ctx.strokeStyle = `rgba(255, 255, 255, ${ringOpacities[index]})`;
        ctx.beginPath();
        ctx.arc(center.x, center.y, targetRadius * scale, 0, Math.PI * 2);
        ctx.stroke();
      });

      ctx.strokeStyle = "rgba(255, 255, 255, 0.68)";
      ctx.beginPath();
      ctx.moveTo(center.x - targetRadius, center.y);
      ctx.lineTo(center.x + targetRadius, center.y);
      ctx.moveTo(center.x, center.y - targetRadius);
      ctx.lineTo(center.x, center.y + targetRadius);
      ctx.stroke();
      drawCueViewArrow(center, targetRadius);

      const marker = {
        x: center.x + cueHit.x * targetRadius,
        y: center.y - cueHit.y * targetRadius
      };
      const markerRadius = getCueHitMarkerRadius(radius);

      ctx.beginPath();
      ctx.arc(marker.x, marker.y, markerRadius + 2, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(0, 0, 0, 0.28)";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(marker.x, marker.y, markerRadius, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255, 255, 255, 0.92)";
      ctx.fill();
      ctx.strokeStyle = "rgba(0, 0, 0, 0.5)";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();
    }

    function drawCueViewArrow(center, targetRadius) {
      const arrowX = center.x + targetRadius + 34;
      const arrowTop = center.y - targetRadius * 0.42;
      const shaftHeight = Math.max(32, targetRadius * 0.52);
      const shaftWidth = 9;
      const headHeight = 22;
      const headWidth = 28;
      const headBaseY = arrowTop + headHeight;

      ctx.save();
      ctx.fillStyle = "rgba(255, 255, 255, 0.68)";
      ctx.fillRect(arrowX - shaftWidth / 2, headBaseY, shaftWidth, shaftHeight);

      ctx.beginPath();
      ctx.moveTo(arrowX, arrowTop);
      ctx.lineTo(arrowX - headWidth / 2, headBaseY);
      ctx.lineTo(arrowX + headWidth / 2, headBaseY);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function getCueHitTargetRadius(ballRadius) {
      return Math.max(26, ballRadius * 4.2);
    }

    function getCueHitMarkerRadius(ballRadius) {
      return Math.max(7, ballRadius * 0.65);
    }

    function drawArea(area, toCanvas, label = "") {
      if (!isArea(area)) return;

      const p1 = toCanvas({ x: area.x1, y: area.y1 });
      const p2 = toCanvas({ x: area.x2, y: area.y2 });
      const x = Math.min(p1.x, p2.x);
      const y = Math.min(p1.y, p2.y);
      const width = Math.abs(p2.x - p1.x);
      const height = Math.abs(p2.y - p1.y);

      ctx.save();
      ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
      ctx.fillRect(x, y, width, height);
      ctx.strokeStyle = "rgba(150, 150, 150, 0.95)";
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x, y, width, height);
      ctx.restore();

      const center = { x: x + width / 2, y: y + height / 2 };
      drawPointDot(center, "#ffffff");
      drawPointLabel({ x: x + width, y: center.y }, label, 8);
    }

    function drawPointLabel(point, label, offsetX = 8) {
      if (isBlank(label)) return;

      const x = point.x + offsetX;
      const y = point.y;

      ctx.save();
      ctx.font = "700 18px 'Microsoft YaHei', 'Noto Sans CJK SC', 'Segoe UI', Arial, sans-serif";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";

      // Offset fills read cleaner than strokeText for CJK glyphs on canvas.
      ctx.fillStyle = "rgba(0, 0, 0, 0.88)";
      [
        [-1.5, 0], [1.5, 0], [0, -1.5], [0, 1.5],
        [-1.5, -1.5], [1.5, -1.5], [-1.5, 1.5], [1.5, 1.5]
      ].forEach(([dx, dy]) => {
        ctx.fillText(label, x + dx, y + dy);
      });

      ctx.fillStyle = "#ffffff";
      ctx.fillText(label, x, y);
      ctx.restore();
    }

    function drawPointDot(point, color) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(point.x, point.y, 3, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.restore();
    }

    function drawGhostBall(center, radius) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(center.x, center.y, radius, 0, Math.PI * 2);
      ctx.setLineDash([5, 5]);
      ctx.strokeStyle = "rgba(255,255,255,0.86)";
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
    }

    function isPoint(point) {
      return Boolean(point)
        && typeof point.x === "number"
        && Number.isFinite(point.x)
        && typeof point.y === "number"
        && Number.isFinite(point.y);
    }

    function isArea(area) {
      return Boolean(area)
        && ["x1", "y1", "x2", "y2"].every((key) => (
          typeof area[key] === "number" && Number.isFinite(area[key])
        ));
    }

    function isBlank(value) {
      return value === null || value === undefined || String(value).trim() === "";
    }

    function toggleFreeLineMode() {
      if (!activeCourse) {
        setStatus("请先加载课程。", true);
        return;
      }

      isDrawingFreeLines = !isDrawingFreeLines;
      if (isDrawingFreeLines) {
        isMarkingVirtualPocket = false;
      }
      freeLineDraftStart = null;
      selectedFreeLineIndex = -1;
      selectedFreeLineEndpoint = null;
      updateButtonStates();
      drawPreview();
      setStatus(isDrawingFreeLines ? "自由连线：请选择起点。" : "已退出自由连线。");
    }

    function toggleVirtualPocketMode() {
      if (!activeCourse) {
        setStatus("请先加载课程。", true);
        return;
      }

      isMarkingVirtualPocket = !isMarkingVirtualPocket;
      if (isMarkingVirtualPocket) {
        isDrawingFreeLines = false;
        freeLineDraftStart = null;
        selectedFreeLineIndex = -1;
        selectedFreeLineEndpoint = null;
      }
      updateButtonStates();
      drawPreview();
      setStatus(isMarkingVirtualPocket ? "虚拟袋口：点击球桌任意位置标记。" : "已退出虚拟袋口标记。");
    }

    function handleCanvasClick(event) {
      if (!activeCourse) return;
      if (suppressNextCanvasClick) {
        suppressNextCanvasClick = false;
        return;
      }

      const renderContext = getRenderContext();
      if (!renderContext) return;

      const canvasPoint = getCanvasPoint(event);

      if (isMarkingVirtualPocket) {
        if (isPointOnVirtualPocket(canvasPoint, renderContext)) {
          return;
        }

        const tablePoint = canvasToTablePoint(canvasPoint, renderContext.bounds, renderContext.layout);
        if (!isPointInsideBounds(tablePoint, renderContext.bounds)) {
          setStatus("点击位置不在桌台内。", true);
          return;
        }

        activeCourse.virtual_pocket = serializeVirtualPocket({
          x: roundCoordinate(tablePoint.x),
          y: roundCoordinate(tablePoint.y)
        });
        updateEditorVirtualPocket(getVirtualPocket(activeCourse));
        isMarkingVirtualPocket = false;
        updateButtonStates();
        drawPreview();
        setStatus("已标记虚拟袋口，可拖动调整位置。");
        return;
      }

      if (!isDrawingFreeLines && updateCueHitFromCanvasPoint(canvasPoint, renderContext)) {
        return;
      }

      const endpoint = findFreeLineEndpointAtCanvasPoint(canvasPoint, renderContext.displayToCanvas);
      if (endpoint) {
        selectedFreeLineIndex = endpoint.index;
        selectedFreeLineEndpoint = endpoint;
        selectedTargetBallIndex = -1;
        selectedSubBallIndex = -1;
        freeLineDraftStart = null;
        updateButtonStates();
        drawPreview();
        setStatus(`已选中线段${endpoint.index + 1}${formatFreeLinePointLabel(endpoint.pointName)}，可拖动调整。`);
        return;
      }

      const hitIndex = findFreeLineAtCanvasPoint(canvasPoint, activeCourse.free_lines, renderContext.displayToCanvas);
      if (hitIndex >= 0) {
        selectedFreeLineIndex = hitIndex;
        selectedFreeLineEndpoint = null;
        selectedTargetBallIndex = -1;
        selectedSubBallIndex = -1;
        freeLineDraftStart = null;
        updateButtonStates();
        drawPreview();
        setStatus(`已选中线段${hitIndex + 1}，按 Delete 删除或在左侧删除。`);
        return;
      }

      const hitTargetIndex = findTargetBallIndexAtCanvasPoint(canvasPoint, renderContext);
      if (hitTargetIndex >= 0) {
        selectedTargetBallIndex = hitTargetIndex;
        selectedSubBallIndex = -1;
        selectedFreeLineIndex = -1;
        selectedFreeLineEndpoint = null;
        freeLineDraftStart = null;
        updateButtonStates();
        drawPreview();
        const targets = getTargetBalls(activeCourse);
        const label = formatTargetBallTitle(hitTargetIndex, targets.length);
        setStatus(`已选中${label}，可用方向键微调（Shift 步进 1）。`);
        return;
      }

      const hitSubIndex = findSubBallIndexAtCanvasPoint(canvasPoint, renderContext);
      if (hitSubIndex >= 0) {
        selectedSubBallIndex = hitSubIndex;
        selectedTargetBallIndex = -1;
        selectedFreeLineIndex = -1;
        selectedFreeLineEndpoint = null;
        freeLineDraftStart = null;
        updateButtonStates();
        drawPreview();
        const subs = getSubBalls(activeCourse);
        const label = formatSubBallTitle(hitSubIndex, subs.length);
        setStatus(`已选中${label}，可用方向键微调（Shift 步进 1）。`);
        return;
      }

      selectedFreeLineIndex = -1;
      selectedFreeLineEndpoint = null;
      selectedTargetBallIndex = -1;
      selectedSubBallIndex = -1;
      if (!isDrawingFreeLines) {
        updateButtonStates();
        drawPreview();
        return;
      }

      const tablePoint = canvasToTablePoint(canvasPoint, renderContext.bounds, renderContext.layout);
      if (!isPointInsideBounds(tablePoint, renderContext.bounds)) {
        setStatus("点击位置不在桌台内。", true);
        updateButtonStates();
        drawPreview();
        return;
      }

      if (!freeLineDraftStart) {
        freeLineDraftStart = tablePoint;
        setStatus("自由连线：请选择终点。");
        drawPreview();
        return;
      }

      activeCourse.free_lines = normalizeFreeLines([
        ...normalizeFreeLines(activeCourse.free_lines),
        {
          from: freeLineDraftStart,
          to: tablePoint
        }
      ]);
      freeLineDraftStart = null;
      renderDetails(activeCourse, activeFile);
      updateButtonStates();
      drawPreview();
      setStatus("已新增自由线，请继续选择起点。");
    }

    function updateCueHitFromCanvasPoint(canvasPoint, renderContext) {
      if (activeCourse.show_cue_hit === false || !isPoint(activeCourse.cue_hit_pos)) return false;

      const center = renderContext.displayToCanvas(activeCourse.cue_hit_pos);
      const targetRadius = getCueHitTargetRadius(getBallRadius(renderContext.cellPixelWidth));
      const dx = canvasPoint.x - center.x;
      const dy = canvasPoint.y - center.y;
      const distance = Math.hypot(dx, dy);
      if (distance > targetRadius) return false;

      const cueHit = normalizeCueHitPoint({
        x: dx / targetRadius,
        y: -dy / targetRadius
      });

      activeCourse.cue_hit = cueHit;
      updateEditorCueHit(cueHit);
      selectedFreeLineIndex = -1;
      selectedFreeLineEndpoint = null;
      freeLineDraftStart = null;
      updateButtonStates();
      drawPreview();
      setStatus(`已标记白球击打位置：${formatCueHitCoordinate(cueHit.x)}, ${formatCueHitCoordinate(cueHit.y)}。`);
      return true;
    }

    function handleDifficultyStarClick(event) {
      const button = event.target.closest(".difficulty-star");
      if (!button) return;

      const stars = Number(button.dataset.stars);
      const input = document.getElementById("difficulty");
      const hint = document.getElementById("difficultyHint");
      if (!input || !Number.isInteger(stars)) return;

      const current = normalizeDifficulty(input.value);
      const next = current === stars ? null : stars;
      input.value = next ?? "";

      document.querySelectorAll(".difficulty-star").forEach((star) => {
        const value = Number(star.dataset.stars);
        const active = next === value;
        star.classList.toggle("active", active);
        star.setAttribute("aria-pressed", String(active));
      });

      const level = getDifficultyLevel(next);
      if (hint) {
        hint.textContent = formatDifficultyLabel(next);
      }

      syncEditorToPreview();
    }

    function deleteFreeLineAtIndex(index) {
      if (!activeCourse) return false;

      const freeLines = normalizeFreeLines(activeCourse.free_lines);
      if (!Number.isInteger(index) || index < 0 || index >= freeLines.length) return false;

      freeLines.splice(index, 1);
      activeCourse.free_lines = freeLines;
      selectedFreeLineIndex = -1;
      selectedFreeLineEndpoint = null;
      freeLineDraftStart = null;
      renderDetails(activeCourse, activeFile);
      updateButtonStates();
      drawPreview();
      setStatus(`已删除线段${index + 1}。`);
      return true;
    }

    function formatFreeLinePointLabel(pointName) {
      return pointName === "from" ? "起点" : "终点";
    }

    function handleFreeLineDeleteClick(event) {
      const button = event.target.closest(".delete-free-line");
      if (!button || !activeCourse) return;

      deleteFreeLineAtIndex(Number(button.dataset.index));
      selectedFreeLineEndpoint = null;
    }

    function isTextEditingTarget(target) {
      return target instanceof HTMLInputElement
        || target instanceof HTMLTextAreaElement
        || target instanceof HTMLSelectElement;
    }

    function handleFreeLineKeyDown(event) {
      if (event.key !== "Delete" && event.key !== "Backspace") return;
      if (!activeCourse || selectedFreeLineIndex < 0) return;
      if (isTextEditingTarget(event.target)) return;

      event.preventDefault();
      deleteFreeLineAtIndex(selectedFreeLineIndex);
    }

    function getArrowDirection(key) {
      const keyMap = {
        ArrowLeft: { dx: -1, dy: 0 },
        ArrowRight: { dx: 1, dy: 0 },
        // Match displayToCanvas: table y grows downward on the table view.
        ArrowUp: { dx: 0, dy: -1 },
        ArrowDown: { dx: 0, dy: 1 }
      };

      return keyMap[key] || null;
    }

    function handleFreeLineInputKeyDown(event) {
      const input = event.target;
      if (!(input instanceof HTMLInputElement)) return;
      if (!input.dataset.freeLineIndex || !input.dataset.freeLinePoint) return;

      const direction = getArrowDirection(event.key);
      if (!direction) return;

      event.preventDefault();
      const index = Number(input.dataset.freeLineIndex);
      const pointName = input.dataset.freeLinePoint;
      const step = event.shiftKey ? 1 : 0.1;
      nudgeFreeLinePoint(index, pointName, direction.dx * step, direction.dy * step);
    }

    function handleAreaInputKeyDown(event) {
      const input = event.target;
      if (!(input instanceof HTMLInputElement)) return;

      const match = input.id.match(/^area_(x1|y1|x2|y2)$/);
      if (!match) return;

      const direction = getArrowDirection(event.key);
      if (!direction) return;

      event.preventDefault();
      const step = event.shiftKey ? 1 : 0.1;
      nudgeAreaCorner(match[1], direction.dx * step, direction.dy * step);
    }

    function handleSubBallKeyDown(event) {
      const direction = getArrowDirection(event.key);
      if (!direction || !activeCourse) return;

      const step = event.shiftKey ? 1 : 0.1;
      const subInputMatch = event.target instanceof HTMLInputElement
        ? event.target.id.match(/^ball_sub_(\d+)_(x|y)$/)
        : null;
      if (subInputMatch) {
        event.preventDefault();
        nudgeSubBall(Number(subInputMatch[1]), direction.dx * step, direction.dy * step);
        return;
      }

      if (selectedSubBallIndex < 0 || isDrawingFreeLines) return;
      if (isTypingInOtherField(event.target)) return;

      event.preventDefault();
      nudgeSubBall(selectedSubBallIndex, direction.dx * step, direction.dy * step);
    }

    function handleTargetBallKeyDown(event) {
      const direction = getArrowDirection(event.key);
      if (!direction || !activeCourse) return;

      const step = event.shiftKey ? 1 : 0.1;
      const targetInputMatch = event.target instanceof HTMLInputElement
        ? event.target.id.match(/^ball_target_(\d+)_(x|y)$/)
        : null;
      if (targetInputMatch) {
        event.preventDefault();
        nudgeTargetBall(Number(targetInputMatch[1]), direction.dx * step, direction.dy * step);
        return;
      }

      if (selectedTargetBallIndex < 0 || isDrawingFreeLines) return;
      if (isTypingInOtherField(event.target)) return;

      event.preventDefault();
      nudgeTargetBall(selectedTargetBallIndex, direction.dx * step, direction.dy * step);
    }

    function isTypingInOtherField(target) {
      if (!(target instanceof HTMLInputElement || target instanceof HTMLTextAreaElement)) return false;

      return !/^ball_target_\d+_(x|y)$/.test(target.id)
        && !/^ball_sub_\d+_(x|y)$/.test(target.id)
        && !/^area_(x1|y1|x2|y2)$/.test(target.id);
    }

    function nudgeTargetBall(index, dx, dy) {
      if (!activeCourse) return;

      const targets = getTargetBalls(activeCourse);
      if (!Number.isInteger(index) || index < 0 || index >= targets.length) return;

      targets[index] = {
        ...targets[index],
        x: roundCoordinate(targets[index].x + dx),
        y: roundCoordinate(targets[index].y + dy)
      };
      activeCourse.ball_target = serializeBallTarget(targets);
      selectedTargetBallIndex = index;
      updateEditorBallTargets(targets);
      updateButtonStates();
      drawPreview();
      setStatus(`已微调${formatTargetBallTitle(index, targets.length)}坐标。`);
    }

    function deleteTargetBall(index) {
      if (!activeCourse) return;

      const targets = getTargetBalls(activeCourse);
      if (!Number.isInteger(index) || index < 0 || index >= targets.length) return;

      targets.splice(index, 1);
      activeCourse.ball_target = serializeBallTarget(targets);
      selectedTargetBallIndex = -1;
      renderDetails(activeCourse, activeFile);
      updateButtonStates();
      drawPreview();
      setStatus("已删除目标球。");
    }

    function nudgeSubBall(index, dx, dy) {
      if (!activeCourse) return;

      const subs = getSubBalls(activeCourse);
      if (!Number.isInteger(index) || index < 0 || index >= subs.length) return;

      subs[index] = {
        x: roundCoordinate(subs[index].x + dx),
        y: roundCoordinate(subs[index].y + dy)
      };
      activeCourse.ball_sub = serializeSubBall(subs);
      selectedSubBallIndex = index;
      updateEditorSubBalls(subs);
      updateButtonStates();
      drawPreview();
      setStatus(`已微调${formatSubBallTitle(index, subs.length)}坐标。`);
    }

    function deleteSubBall(index) {
      if (!activeCourse) return;

      const subs = getSubBalls(activeCourse);
      if (!Number.isInteger(index) || index < 0 || index >= subs.length) return;

      subs.splice(index, 1);
      activeCourse.ball_sub = serializeSubBall(subs);
      selectedSubBallIndex = -1;
      renderDetails(activeCourse, activeFile);
      updateButtonStates();
      drawPreview();
      setStatus("已删除辅助球。");
    }

    function nudgeAreaCorner(key, dx, dy) {
      if (!activeCourse) return;

      let area;
      try {
        area = readArea();
      } catch {
        return;
      }
      if (!isArea(area)) return;

      if (key === "x1" || key === "y1") {
        area.x1 = roundCoordinate(area.x1 + dx);
        area.y1 = roundCoordinate(area.y1 + dy);
      } else {
        area.x2 = roundCoordinate(area.x2 + dx);
        area.y2 = roundCoordinate(area.y2 + dy);
      }

      activeCourse.area = area;
      updateEditorArea(area);
      updateButtonStates();
      drawPreview();
      const cornerLabel = key === "x1" || key === "y1" ? "左上" : "右下";
      setStatus(`已微调停球区${cornerLabel}角坐标。`);
    }

    function nudgeFreeLinePoint(index, pointName, dx, dy) {
      if (!activeCourse) return;

      const freeLines = normalizeFreeLines(readFreeLinesFromEditor());
      const line = freeLines[index];
      if (!line || !line[pointName]) return;

      line[pointName] = {
        x: roundCoordinate(line[pointName].x + dx),
        y: roundCoordinate(line[pointName].y + dy)
      };
      activeCourse.free_lines = freeLines;
      updateFreeLineInputs(index, pointName, line[pointName]);
      updateButtonStates();
      drawPreview();
      setStatus(`已微调线段${index + 1}${pointName === "from" ? "起点" : "终点"}。`);
    }

    function updateFreeLineInputs(index, pointName, point) {
      const xInput = document.getElementById(`free_line_${index}_${pointName}_x`);
      const yInput = document.getElementById(`free_line_${index}_${pointName}_y`);
      if (xInput) xInput.value = formatCoordinateValue(point.x);
      if (yInput) yInput.value = formatCoordinateValue(point.y);
    }

    function handleCanvasPointerDown(event) {
      if (!activeCourse || isDrawingFreeLines) return;

      const renderContext = getRenderContext();
      if (!renderContext) return;

      const canvasPoint = getCanvasPoint(event);
      const draggable = findDraggableElementAtCanvasPoint(canvasPoint, renderContext);
      if (!draggable) return;

      activeDrag = {
        type: draggable.type,
        index: draggable.index,
        pointName: draggable.pointName,
        pointerId: event.pointerId,
        moved: false
      };

      if (draggable.type === "area" && isArea(activeCourse.area)) {
        const area = activeCourse.area;
        const startTablePoint = canvasToTablePoint(canvasPoint, renderContext.bounds, renderContext.layout);
        const centerX = (area.x1 + area.x2) / 2;
        const centerY = (area.y1 + area.y2) / 2;
        activeDrag.areaSnapshot = { ...area };
        activeDrag.grabOffset = {
          x: startTablePoint.x - centerX,
          y: startTablePoint.y - centerY
        };
      }

      canvas.setPointerCapture(event.pointerId);
      event.preventDefault();
    }

    function handleCanvasPointerMove(event) {
      if (!activeDrag || activeDrag.pointerId !== event.pointerId) return;

      const renderContext = getRenderContext();
      if (!renderContext) return;

      const tablePoint = canvasToTablePoint(getCanvasPoint(event), renderContext.bounds, renderContext.layout);
      if (!isPointInsideBounds(tablePoint, renderContext.bounds)) return;

      if (activeDrag.type === "ball_target") {
        const targets = getTargetBalls(activeCourse);
        if (activeDrag.index < 0 || activeDrag.index >= targets.length) return;

        targets[activeDrag.index] = {
          ...targets[activeDrag.index],
          x: tablePoint.x,
          y: tablePoint.y
        };
        activeCourse.ball_target = serializeBallTarget(targets);
        updateEditorBallTargets(targets);
      } else if (activeDrag.type === "ball_sub") {
        const subs = getSubBalls(activeCourse);
        if (activeDrag.index < 0 || activeDrag.index >= subs.length) return;

        subs[activeDrag.index] = {
          x: roundCoordinate(tablePoint.x),
          y: roundCoordinate(tablePoint.y)
        };
        activeCourse.ball_sub = serializeSubBall(subs);
        updateEditorSubBalls(subs);
      } else if (activeDrag.type === "area") {
        const { areaSnapshot, grabOffset } = activeDrag;
        if (!isArea(areaSnapshot) || !grabOffset) return;

        const halfWidth = (areaSnapshot.x2 - areaSnapshot.x1) / 2;
        const halfHeight = (areaSnapshot.y2 - areaSnapshot.y1) / 2;
        const centerX = tablePoint.x - grabOffset.x;
        const centerY = tablePoint.y - grabOffset.y;

        activeCourse.area = {
          x1: roundCoordinate(centerX - halfWidth),
          y1: roundCoordinate(centerY - halfHeight),
          x2: roundCoordinate(centerX + halfWidth),
          y2: roundCoordinate(centerY + halfHeight)
        };
        updateEditorArea(activeCourse.area);
      } else if (activeDrag.type === "free_line_point") {
        const freeLines = normalizeFreeLines(activeCourse.free_lines);
        const line = freeLines[activeDrag.index];
        if (!line || !line[activeDrag.pointName]) return;

        line[activeDrag.pointName] = {
          x: roundCoordinate(tablePoint.x),
          y: roundCoordinate(tablePoint.y)
        };
        activeCourse.free_lines = freeLines;
        updateFreeLineInputs(activeDrag.index, activeDrag.pointName, line[activeDrag.pointName]);
      } else if (activeDrag.type === "virtual_pocket") {
        activeCourse.virtual_pocket = serializeVirtualPocket({
          x: roundCoordinate(tablePoint.x),
          y: roundCoordinate(tablePoint.y)
        });
        updateEditorVirtualPocket(getVirtualPocket(activeCourse));
      } else {
        activeCourse[activeDrag.type] = tablePoint;
        updateEditorPoint(activeDrag.type, tablePoint);
      }
      activeDrag.moved = true;
      drawPreview();
      event.preventDefault();
    }

    function handleCanvasPointerUp(event) {
      if (!activeDrag || activeDrag.pointerId !== event.pointerId) return;

      suppressNextCanvasClick = activeDrag.moved;
      if (activeDrag.type === "ball_target" && Number.isInteger(activeDrag.index)) {
        selectedTargetBallIndex = activeDrag.index;
      }
      if (activeDrag.type === "ball_sub" && Number.isInteger(activeDrag.index)) {
        selectedSubBallIndex = activeDrag.index;
      }
      if (activeDrag.type === "free_line_point" && Number.isInteger(activeDrag.index)) {
        selectedFreeLineIndex = activeDrag.index;
        selectedFreeLineEndpoint = {
          index: activeDrag.index,
          pointName: activeDrag.pointName
        };
      }
      const label = activeDrag.type === "ball_target" && Number.isInteger(activeDrag.index)
        ? formatTargetBallTitle(
          activeDrag.index,
          getTargetBalls(activeCourse).length
        )
        : activeDrag.type === "free_line_point" && Number.isInteger(activeDrag.index)
          ? `线段${activeDrag.index + 1}${formatFreeLinePointLabel(activeDrag.pointName)}`
        : activeDrag.type === "ball_sub" && Number.isInteger(activeDrag.index)
          ? formatSubBallTitle(
            activeDrag.index,
            getSubBalls(activeCourse).length
          )
          : activeDrag.type === "ball_sub"
            ? COURSE_LABELS.ball_sub
            : activeDrag.type === "virtual_pocket"
              ? COURSE_LABELS.virtual_pocket
              : activeDrag.type === "area"
              ? COURSE_LABELS.area
              : getFieldLabel(activeDrag.type);
      activeDrag = null;
      canvas.releasePointerCapture(event.pointerId);
      updateButtonStates();
      setStatus(`已更新${label}坐标。`);
      event.preventDefault();
    }

    function findDraggableElementAtCanvasPoint(canvasPoint, renderContext) {
      const ballRadius = getBallRadius(renderContext.cellPixelWidth);
      if (activeCourse.show_cue_hit !== false && isPoint(activeCourse.cue_hit) && isPoint(activeCourse.cue_hit_pos)) {
        const center = renderContext.displayToCanvas(activeCourse.cue_hit_pos);
        const hitRadius = Math.max(14, getCueHitTargetRadius(ballRadius) * 0.28);
        if (Math.hypot(canvasPoint.x - center.x, canvasPoint.y - center.y) <= hitRadius) {
          return { type: "cue_hit_pos" };
        }
      }

      if (isPoint(activeCourse.ball_white)) {
        const center = renderContext.displayToCanvas(activeCourse.ball_white);
        if (Math.hypot(canvasPoint.x - center.x, canvasPoint.y - center.y) <= ballRadius + 10) {
          return { type: "ball_white" };
        }
      }

      const hitSubIndex = findSubBallIndexAtCanvasPoint(canvasPoint, renderContext);
      if (hitSubIndex >= 0) {
        return { type: "ball_sub", index: hitSubIndex };
      }

      if (isPointOnVirtualPocket(canvasPoint, renderContext)) {
        return { type: "virtual_pocket" };
      }

      const hitTargetIndex = findTargetBallIndexAtCanvasPoint(canvasPoint, renderContext);
      if (hitTargetIndex >= 0) {
        return { type: "ball_target", index: hitTargetIndex };
      }

      const endpoint = findFreeLineEndpointAtCanvasPoint(canvasPoint, renderContext.displayToCanvas);
      if (endpoint) {
        return {
          type: "free_line_point",
          index: endpoint.index,
          pointName: endpoint.pointName
        };
      }

      if (isArea(activeCourse.area) && isPointInAreaBox(canvasPoint, renderContext)) {
        return { type: "area" };
      }

      if (isPoint(activeCourse.desc_pos) && isPointInDescriptionBox(canvasPoint, renderContext)) {
        return { type: "desc_pos" };
      }

      return null;
    }

    function isPointInAreaBox(canvasPoint, renderContext) {
      if (!isArea(activeCourse.area)) return false;

      const p1 = renderContext.displayToCanvas({ x: activeCourse.area.x1, y: activeCourse.area.y1 });
      const p2 = renderContext.displayToCanvas({ x: activeCourse.area.x2, y: activeCourse.area.y2 });
      const x = Math.min(p1.x, p2.x);
      const y = Math.min(p1.y, p2.y);
      const width = Math.abs(p2.x - p1.x);
      const height = Math.abs(p2.y - p1.y);

      return canvasPoint.x >= x
        && canvasPoint.x <= x + width
        && canvasPoint.y >= y
        && canvasPoint.y <= y + height;
    }

    function findTargetBallIndexAtCanvasPoint(canvasPoint, renderContext) {
      const ballRadius = getBallRadius(renderContext.cellPixelWidth);
      const targetBalls = getTargetBalls(activeCourse);

      for (let index = targetBalls.length - 1; index >= 0; index -= 1) {
        const center = renderContext.displayToCanvas({ x: targetBalls[index].x, y: targetBalls[index].y });
        if (Math.hypot(canvasPoint.x - center.x, canvasPoint.y - center.y) <= ballRadius + 10) {
          return index;
        }
      }

      return -1;
    }

    function findSubBallIndexAtCanvasPoint(canvasPoint, renderContext) {
      const ballRadius = getBallRadius(renderContext.cellPixelWidth);
      const subBalls = getSubBalls(activeCourse);

      for (let index = subBalls.length - 1; index >= 0; index -= 1) {
        const center = renderContext.displayToCanvas({ x: subBalls[index].x, y: subBalls[index].y });
        if (Math.hypot(canvasPoint.x - center.x, canvasPoint.y - center.y) <= ballRadius + 10) {
          return index;
        }
      }

      return -1;
    }

    function isPointInDescriptionBox(canvasPoint, renderContext) {
      const origin = renderContext.displayToCanvas(activeCourse.desc_pos);
      const rightEdge = renderContext.displayToCanvas({ x: renderContext.bounds.maxX, y: activeCourse.desc_pos.y });
      const width = Math.max(120, rightEdge.x - origin.x);
      const height = 120;

      return canvasPoint.x >= origin.x
        && canvasPoint.x <= origin.x + width
        && canvasPoint.y >= origin.y
        && canvasPoint.y <= origin.y + height;
    }

    function updateEditorPoint(prefix, point) {
      const xInput = document.getElementById(`${prefix}_x`);
      const yInput = document.getElementById(`${prefix}_y`);
      if (xInput) xInput.value = formatCoordinateValue(point.x);
      if (yInput) yInput.value = formatCoordinateValue(point.y);
    }

    function updateEditorCueHit(point) {
      const xInput = document.getElementById("cue_hit_x");
      const yInput = document.getElementById("cue_hit_y");
      if (!xInput || !yInput) return;

      if (!point) {
        xInput.value = "";
        yInput.value = "";
        return;
      }

      xInput.value = formatCueHitCoordinate(point.x);
      yInput.value = formatCueHitCoordinate(point.y);
    }

    function updateEditorArea(area) {
      if (!isArea(area)) return;

      ["x1", "y1", "x2", "y2"].forEach((key) => {
        const input = document.getElementById(`area_${key}`);
        if (input) input.value = formatCoordinateValue(area[key]);
      });
    }

    function updateEditorBallTargets(entries) {
      entries.forEach((entry, index) => {
        const xInput = document.getElementById(`ball_target_${index}_x`);
        const yInput = document.getElementById(`ball_target_${index}_y`);
        const numSelect = document.getElementById(`ball_target_${index}_num`);
        if (xInput) xInput.value = formatCoordinateValue(entry.x);
        if (yInput) yInput.value = formatCoordinateValue(entry.y);
        if (numSelect) numSelect.value = entry.num != null ? String(entry.num) : "";
        updateTargetBallPreview(index, entry.num);
      });
    }

    function updateEditorSubBalls(entries) {
      entries.forEach((entry, index) => {
        const xInput = document.getElementById(`ball_sub_${index}_x`);
        const yInput = document.getElementById(`ball_sub_${index}_y`);
        if (xInput) xInput.value = formatCoordinateValue(entry.x);
        if (yInput) yInput.value = formatCoordinateValue(entry.y);
      });
    }

    function resetFreeLineInteraction() {
      isDrawingFreeLines = false;
      isMarkingVirtualPocket = false;
      freeLineDraftStart = null;
      selectedFreeLineIndex = -1;
      selectedFreeLineEndpoint = null;
      selectedTargetBallIndex = -1;
      selectedSubBallIndex = -1;
      activeDrag = null;
    }

    function getCanvasPoint(event) {
      const rect = canvas.getBoundingClientRect();

      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    function canvasToTablePoint(point, bounds, layout) {
      return {
        x: roundCoordinate(bounds.minX + (point.x - layout.originX) / layout.scaleX),
        y: roundCoordinate(bounds.minY + (point.y - layout.originY) / layout.scaleY)
      };
    }

    function isPointInsideBounds(point, bounds) {
      return isPoint(point)
        && point.x >= bounds.minX
        && point.x <= bounds.maxX
        && point.y >= bounds.minY
        && point.y <= bounds.maxY;
    }

    function findFreeLineEndpointAtCanvasPoint(canvasPoint, toCanvas) {
      const hitRadius = 12;
      const lines = normalizeFreeLines(activeCourse?.free_lines);

      for (let index = lines.length - 1; index >= 0; index -= 1) {
        const from = toCanvas(lines[index].from);
        const to = toCanvas(lines[index].to);

        if (Math.hypot(canvasPoint.x - to.x, canvasPoint.y - to.y) <= hitRadius) {
          return { index, pointName: "to" };
        }

        if (Math.hypot(canvasPoint.x - from.x, canvasPoint.y - from.y) <= hitRadius) {
          return { index, pointName: "from" };
        }
      }

      return null;
    }

    function findFreeLineAtCanvasPoint(canvasPoint, freeLines, toCanvas) {
      const hitRange = 8;
      const lines = normalizeFreeLines(freeLines);

      for (let i = lines.length - 1; i >= 0; i -= 1) {
        const start = toCanvas(lines[i].from);
        const end = toCanvas(lines[i].to);
        if (distanceToSegment(canvasPoint, start, end) <= hitRange) return i;
      }

      return -1;
    }

    function distanceToSegment(point, start, end) {
      const dx = end.x - start.x;
      const dy = end.y - start.y;
      const lengthSquared = dx * dx + dy * dy;
      if (lengthSquared === 0) return Math.hypot(point.x - start.x, point.y - start.y);

      const t = Math.max(0, Math.min(1, ((point.x - start.x) * dx + (point.y - start.y) * dy) / lengthSquared));
      const projection = {
        x: start.x + t * dx,
        y: start.y + t * dy
      };

      return Math.hypot(point.x - projection.x, point.y - projection.y);
    }

    function roundCoordinate(value) {
      return Math.round(value * 1000) / 1000;
    }

    function line(start, end) {
      ctx.beginPath();
      ctx.moveTo(start.x, start.y);
      ctx.lineTo(end.x, end.y);
      ctx.stroke();
    }

    function roundRect(context, x, y, width, height, radius) {
      const r = Math.min(radius, Math.abs(width) / 2, Math.abs(height) / 2);
      context.beginPath();
      context.moveTo(x + r, y);
      context.arcTo(x + width, y, x + width, y + height, r);
      context.arcTo(x + width, y + height, x, y + height, r);
      context.arcTo(x, y + height, x, y, r);
      context.arcTo(x, y, x + width, y, r);
      context.closePath();
    }

    authorizeButton.addEventListener("click", authorizeCoursesFolder);
    newCourseButton.addEventListener("click", createNewCourse);
    loadButton.addEventListener("click", loadSelectedCourse);
    saveButton.addEventListener("click", saveCourse);
    drawLineButton.addEventListener("click", toggleFreeLineMode);
    virtualPocketButton.addEventListener("click", toggleVirtualPocketMode);
    canvas.addEventListener("click", handleCanvasClick);
    canvas.addEventListener("pointerdown", handleCanvasPointerDown);
    canvas.addEventListener("pointermove", handleCanvasPointerMove);
    canvas.addEventListener("pointerup", handleCanvasPointerUp);
    canvas.addEventListener("pointercancel", handleCanvasPointerUp);
    detailsEl.addEventListener("submit", (event) => event.preventDefault());
    detailsEl.addEventListener("input", (event) => {
      if (isTargetBallNumSelect(event.target)) {
        handleTargetBallNumChange(event);
        return;
      }
      if (isDisplayFlagCheckbox(event.target)) {
        handleDisplayFlagChange(event);
        return;
      }
      syncEditorToPreview();
    });
    detailsEl.addEventListener("change", (event) => {
      if (event.target.id === "chapter") {
        handleChapterChange();
      }
      if (event.target.id === "legendFileInput") {
        handleLegendFileSelected(event);
        return;
      }
      if (isTargetBallNumSelect(event.target)) {
        handleTargetBallNumChange(event);
        return;
      }
      if (isDisplayFlagCheckbox(event.target)) {
        handleDisplayFlagChange(event);
        return;
      }
      syncEditorToPreview();
    });
    function handleSubBallButtonClick(event) {
      const deleteButton = event.target.closest(".delete-sub-ball");
      if (deleteButton) {
        event.preventDefault();
        event.stopPropagation();
        deleteSubBall(Number(deleteButton.dataset.index));
        return;
      }

      const addButton = event.target.closest(".add-sub-ball");
      if (addButton) {
        event.preventDefault();
        addSubBall();
        return;
      }

      const item = event.target.closest(".sub-ball-list .target-ball-item");
      if (item && event.target.closest(".target-ball-fields")) return;

      if (item) {
        event.preventDefault();
        selectSubBall(Number(item.dataset.index));
      }
    }

    function handleVirtualPocketButtonClick(event) {
      if (!event.target.classList.contains("clear-virtual-pocket")) return;
      event.preventDefault();
      clearVirtualPocket();
    }

    function handleLegendButtonClick(event) {
      if (!event.target.classList.contains("clear-legend")) return;
      event.preventDefault();
      clearLegend();
    }

    function handleTargetBallButtonClick(event) {
      const deleteButton = event.target.closest(".delete-target-ball");
      if (deleteButton) {
        event.preventDefault();
        event.stopPropagation();
        deleteTargetBall(Number(deleteButton.dataset.index));
        return;
      }

      const addButton = event.target.closest(".add-target-ball");
      if (addButton) {
        event.preventDefault();
        addTargetBall();
        return;
      }

      const item = event.target.closest(".target-ball-item");
      if (!item || item.closest(".sub-ball-list")) return;
      if (item && event.target.closest(".target-ball-fields")) return;

      if (item) {
        event.preventDefault();
        selectTargetBall(Number(item.dataset.index));
      }
    }

    detailsEl.addEventListener("click", handleSubBallButtonClick);
    detailsEl.addEventListener("click", handleVirtualPocketButtonClick);
    detailsEl.addEventListener("click", handleLegendButtonClick);
    detailsEl.addEventListener("click", handleTargetBallButtonClick);
    detailsEl.addEventListener("click", handleDifficultyStarClick);
    detailsEl.addEventListener("click", handleFreeLineDeleteClick);
    detailsEl.addEventListener("keydown", handleFreeLineInputKeyDown);
    detailsEl.addEventListener("keydown", handleAreaInputKeyDown);
    window.addEventListener("keydown", handleTargetBallKeyDown);
    window.addEventListener("keydown", handleSubBallKeyDown);
    window.addEventListener("keydown", handleFreeLineKeyDown);
    coursePickerTrigger.addEventListener("click", () => {
      toggleCoursePicker();
    });
    coursePickerMenuEl.addEventListener("click", (event) => {
      const item = event.target.closest(".course-picker-item");
      if (!item) return;

      const index = Number(item.dataset.index);
      if (!Number.isInteger(index) || index < 0 || index >= courseFiles.length) return;

      activeFile = courseFiles[index];
      editorFile = null;
      closeCoursePicker();
      updateButtonStates();
      setStatus(`已选择 ${activeFile}，点击「加载」渲染。`);
    });
    document.addEventListener("click", (event) => {
      if (!coursePickerEl.contains(event.target)) {
        closeCoursePicker();
      }
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeCoursePicker();
      }
    });
    window.addEventListener("resize", drawPreview);

    bootstrapSiteHostingSync();
    renderCoursePicker();
    setStatus(location.protocol === "file:"
      ? "正在打开免安装模式…"
      : isSiteHttpHosting()
      ? "正在加载题目…"
      : "正在初始化…");

    Promise.all([loadBallWhiteImage(), loadBallTargetImage(), preloadSnookerBallImages()]).finally(() => {
      drawPreview();
    });

    restoreDirectoryOnStartup().catch((error) => {
      setStatus(isSiteHttpHosting()
        ? `加载题目失败：${error.message}`
        : `恢复上次目录失败：${error.message}，请重新点击「目录」。`, true);
    }).finally(() => {
      updateButtonStates();
    });
  </script>
</body>
